      --line-height-xs: 1.429rem;
      --line-height-s:  1.714rem;
      --line-height-m:  2.000rem;
      --space-xxs: 2px;
      --space-xs:  4px;
      --space-s:   8px;
      --space-m:   12px;
      --space-base: 16px;
      --space-l:   24px;
      --space-xl:  32px;
      --space-xxl: 40px;

    a { color: var(--color-primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page-header { background: var(--color-empty-shade); border-bottom: var(--border-thin); padding: var(--space-l) 0; }
    .page-header-inner { max-width: var(--page-max-width); margin: 0 auto; padding: 0 var(--space-l); }
    .breadcrumb { font-size: var(--text-xs); color: var(--color-subdued); margin-bottom: var(--space-xs); }
    .breadcrumb a { color: var(--color-primary); }
    .page-header h1 { font-size: var(--text-l); font-weight: var(--font-weight-semibold); color: var(--color-ink); }
    .page-header p { font-size: var(--text-xs); color: var(--color-subdued); margin-top: var(--space-xs); }

    .page-body { max-width: var(--page-max-width); margin: 0 auto; padding: var(--space-l); }

    .badge { display: inline-flex; align-items: center; font-size: var(--text-xs); font-weight: var(--font-weight-semibold); padding: 2px var(--space-s); border-radius: var(--border-radius); line-height: 1.5; white-space: nowrap; }

    .badge--success { background: var(--color-success-bg); color: var(--color-success); }
    .badge--warning { background: var(--color-warning-bg); color: var(--color-warning-text); }
    .badge--danger  { background: var(--color-danger-bg);  color: var(--color-danger); }
    .badge--na      { background: var(--color-lightest-shade); color: var(--color-subdued); border: var(--border-thin); font-style: italic; }

    .panel { background: var(--color-empty-shade); border: var(--border-thin); border-radius: var(--border-radius); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: var(--space-m) var(--space-l); border-bottom: var(--border-thin); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: var(--text-s); }

    tbody td { padding: var(--space-m); border-bottom: var(--border-thin); vertical-align: middle; color: var(--color-paragraph); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr.data-row:hover { background: var(--color-lightest-shade); }
    td.score-td { cursor: pointer; }
    td.score-td:hover .badge { filter: brightness(0.92); }

    /* Average row */
    tr.avg-row td { background: var(--color-lightest-shade); border-bottom: var(--border-thick); padding: var(--space-xl) var(--space-m); }
    .avg-row__label { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-subdued); }

    .avg-score__value { font-size: var(--text-xxl); font-weight: var(--font-weight-semibold); font-variant-numeric: tabular-nums; line-height: 1; }

    .module-name { font-weight: var(--font-weight-semibold); color: var(--color-ink); font-family: var(--font-mono); font-size: var(--text-xs); }
    .module-display { font-size: var(--text-xs); color: var(--color-subdued); margin-top: 2px; }

    /* Drawer */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(7,16,31,0.55); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(2px); }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 50%; left: 50%; width: 92%; max-width: 940px; max-height: 88vh; background: var(--color-empty-shade); border: var(--border-thin); border-radius: 10px; box-shadow: 0 24px 64px hsla(217,30%,10%,.28), 0 4px 16px hsla(217,30%,24%,.14); z-index: 101; transform: translate(-50%, -50%) scale(0.96); opacity: 0; pointer-events: none; transition: transform 0.2s cubic-bezier(.34,1.3,.64,1), opacity 0.15s; overflow-y: auto; display: flex; flex-direction: column; }
    .drawer.open { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
    .drawer-header { position: sticky; top: 0; background: var(--color-empty-shade); border-bottom: var(--border-thin); padding: var(--space-l); display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-m); z-index: 1; border-radius: 10px 10px 0 0; }
    .drawer-close { background: none; border: none; cursor: pointer; color: var(--color-subdued); font-size: 18px; padding: var(--space-xs); border-radius: var(--border-radius); line-height: 1; }
    .drawer-close:hover { background: var(--color-lightest-shade); color: var(--color-ink); }
    .drawer-body { padding: var(--space-l); flex: 1; }
    .drawer-section { margin-bottom: var(--space-xl); }
    .drawer-section:last-child { margin-bottom: 0; }
    .drawer-section-title { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-ink); margin-bottom: var(--space-m); display: flex; align-items: center; gap: var(--space-s); padding-bottom: var(--space-s); border-bottom: var(--border-thin); }
    .risk-list, .rec-list { list-style: none; padding: 0; }
    .risk-list li, .rec-list li { font-size: var(--text-xs); color: var(--color-paragraph); line-height: 1.6; padding: var(--space-xxs) 0 var(--space-xxs) var(--space-m); position: relative; }
    .risk-list li::before { content: ''; position: absolute; left: 0; top: 8px; width: 6px; height: 6px; border-radius: 50%; background: var(--color-danger); }
    .rec-list li::before { background: var(--color-primary); }

    .cat-bar-count { font-size: var(--text-xs); color: var(--color-subdued); width: 50px; text-align: right; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .token-file-row { display: flex; align-items: center; justify-content: space-between; padding: var(--space-xs) 0; border-bottom: var(--border-thin); gap: var(--space-m); }
    .token-file-row:last-child { border-bottom: none; }
    .token-file-path { font-family: var(--font-mono); font-size: 0.75rem; color: var(--color-paragraph); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .prompt-pre { font-size: var(--text-xs); line-height: 1.65; background: var(--color-lightest-shade); border: var(--border-thin); border-radius: var(--border-radius); padding: var(--space-m) var(--space-l); white-space: pre-wrap; word-break: break-word; color: var(--color-paragraph); font-family: var(--font-body); overflow: hidden; }
    .prompt-pre.prompt-collapsed { max-height: 4.95em; }
    .prompt-toggle { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; color: var(--color-primary); font-size: var(--text-xs); cursor: pointer; padding: var(--space-xs) 0; font-family: var(--font-body); font-weight: var(--font-weight-semibold); margin-top: var(--space-xs); }
    .prompt-toggle:hover { text-decoration: underline; }
    .prompt-copy-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: var(--border-thin); border-radius: var(--border-radius); color: var(--color-primary); font-size: var(--text-xs); font-family: var(--font-body); font-weight: var(--font-weight-semibold); cursor: pointer; padding: 2px var(--space-s); transition: all 0.15s; }
    .prompt-copy-btn:hover { background: var(--color-primary-bg); }
    .prompt-copy-btn.copied { color: var(--color-success); border-color: var(--color-success); background: var(--color-success-bg); }
  </style>
</head>

        tokens:{ score:36, violations:80, css_files:62, token_usages:45, by_cat:{color:0,space:80,radius:0,typography:0},
          top_files:[
            {path:'apps/client/app/components/module-risks/inventory/risk-entities/table-header.css',violations:6},
            {path:'apps/client/app/components/module-risks/inventory/hierarchy/table-header.css',violations:6},
            {path:'apps/client/app/components/module-risks/hierarchy/risk-tree/table-header.css',violations:5},
            {path:'apps/client/app/components/module-risks/shared/brackets/range-editor.css',violations:5},
            {path:'apps/client/app/components/module-risks/view/intake/intake.css',violations:5},
            {path:'apps/client/app/components/module-risks/intake/subsection.css',violations:4},
            {path:'apps/client/app/components/module-risks/inventory/risk-entities/node.css',violations:4},
            {path:'apps/client/app/components/module-risks/view/control-mapping/mapping-step-footer.css',violations:4}
          ]
        }
      },
      { name:'owner-dashboard', display:'Owner Dashboard',
        a11y:58, i18n:82,
        a11yRisks:['narratives-list.gjs uses {{on "click"}} on a Link; may not respond to Enter/Space as expected','0 aria-label attributes in sampled components'],
        a11yRecs:['Replace on "click" handler on Link with a Button component for the preview action','Add aria-label to narrative preview trigger identifying the specific narrative by title'],
        i18nRisks:['ICU select covers 4 types + "other"; new entity types will silently fall through to generic "Entities" label'],
        i18nRecs:['Add new entity types to the ICU select statement as the product expands'],
        tokens:{ score:59, violations:7, css_files:10, token_usages:10, by_cat:{color:0,space:7,radius:0,typography:0},
          top_files:[
            {path:'apps/client/app/components/owner-dashboard/dashboard-nav.css',violations:3},
            {path:'apps/client/app/components/owner-dashboard/tasks/tasks-overview.css',violations:2},
            {path:'apps/client/app/components/owner-dashboard/risks/risks-chart.css',violations:1},
            {path:'apps/client/app/components/owner-dashboard/overview-panel/doughnut-chart.css',violations:1}
          ]
        }
      },
    ];

    // ---- Helpers ----
    function scoreColor(score) {
      if (score >= 80) return 'var(--color-success)';
      if (score >= 65) return 'var(--color-warning-text)';
      return 'var(--color-danger)';
    }
    function scoreBadgeClass(score) {
      if (score >= 80) return 'badge--success';
      if (score >= 65) return 'badge--warning';
      return 'badge--danger';
    }
    function letterGrade(score) {
      if (score >= 93) return 'A';
      if (score >= 90) return 'A\u2212';
      if (score >= 87) return 'B+';
      if (score >= 83) return 'B';
      if (score >= 80) return 'B\u2212';
      if (score >= 77) return 'C+';
      if (score >= 73) return 'C';
      if (score >= 70) return 'C\u2212';
      if (score >= 67) return 'D+';
      if (score >= 63) return 'D';
      if (score >= 60) return 'D\u2212';
      return 'F';
    }
    function scoreBadge(score) {
      return `<span class="badge ${scoreBadgeClass(score)}">${score}</span>`;
    }

    // ---- Derived averages ----
    const count = MODULES.length;
    const avgA11y = Math.round(MODULES.reduce((s, m) => s + m.a11y, 0) / count);
    const avgI18n = Math.round(MODULES.reduce((s, m) => s + m.i18n, 0) / count);
    const tokenModules = MODULES.filter(m => m.tokens !== null);
    const avgTokens = Math.round(tokenModules.reduce((s, m) => s + m.tokens.score, 0) / tokenModules.length);

    // ---- Render table ----
    const tbody = document.getElementById('table-body');

    const avgRow = `
      <tr class="avg-row">
        <td>
          <div class="avg-row__label">Average</div>
        </td>
        <td class="score-td" onclick="openDrawerAvg('a11y')">
          <div class="avg-score">
            <div class="avg-score__value" style="color:${scoreColor(avgA11y)}">${avgA11y}</div>
            <span class="badge ${scoreBadgeClass(avgA11y)}">${letterGrade(avgA11y)} across ${count} modules</span>
          </div>
        </td>
        <td class="score-td" onclick="openDrawerAvg('i18n')">
          <div class="avg-score">
            <div class="avg-score__value" style="color:${scoreColor(avgI18n)}">${avgI18n}</div>
            <span class="badge ${scoreBadgeClass(avgI18n)}">${letterGrade(avgI18n)} across ${count} modules</span>
          </div>
        </td>
        <td class="score-td" onclick="openDrawerAvg('tokens')">
          <div class="avg-score">
            <div class="avg-score__value" style="color:${scoreColor(avgTokens)}">${avgTokens}</div>
            <span class="badge ${scoreBadgeClass(avgTokens)}">${letterGrade(avgTokens)} across ${tokenModules.length} modules</span>
          </div>
        </td>
      </tr>
    `;

    const moduleRows = MODULES.map(m => {
      const tokCell = m.tokens !== null
        ? `<td class="score-td" onclick="openDrawer('${m.name}','tokens')">${scoreBadge(m.tokens.score)}</td>`
        : `<td><span class="badge badge--na">N/A</span></td>`;
      return `
        <tr class="data-row">
          <td>
            <div class="module-name">${m.name}</div>
            <div class="module-display">${m.display}</div>
          </td>
          <td class="score-td" onclick="openDrawer('${m.name}','a11y')">${scoreBadge(m.a11y)}</td>
          <td class="score-td" onclick="openDrawer('${m.name}','i18n')">${scoreBadge(m.i18n)}</td>
          ${tokCell}
        </tr>
      `;
    }).join('');

    tbody.innerHTML = avgRow + moduleRows;

    // ---- Drawer helpers ----
    function buildA11yBody(m) {
      const risks = m.a11yRisks.map(r => `<li>${r}</li>`).join('');
      const recs  = m.a11yRecs.map(r => `<li>${r}</li>`).join('');
      const prompt = `You are reviewing the ${m.display} module in auditboard-frontend for accessibility issues.\n\nTop risks identified:\n${m.a11yRisks.map(r => '- ' + r).join('\n')}\n\nRecommended fixes:\n${m.a11yRecs.map(r => '- ' + r).join('\n')}\n\nPlease help me address these accessibility issues. Start by searching for the relevant files and then propose concrete code changes.`;
      return `
        <div class="drawer-section">
          <div class="drawer-section-title">Risks</div>
          <ul class="risk-list">${risks}</ul>
        </div>
        <div class="drawer-section">
          <div class="drawer-section-title">Recommendations</div>
          <ul class="rec-list">${recs}</ul>
        </div>
        <div class="drawer-section">
          <div class="drawer-section-title">Claude Code Prompt</div>
          <div style="margin-bottom:var(--space-s);">
            <button class="prompt-copy-btn" onclick="copyPrompt(this, ${JSON.stringify(prompt)})">Copy prompt</button>
          </div>
          <pre class="prompt-pre prompt-collapsed">${prompt}</pre>
          <button class="prompt-toggle" onclick="togglePrompt(this)">Show more ›</button>
        </div>
      `;
    }

    function buildI18nBody(m) {
      const risks = m.i18nRisks.map(r => `<li>${r}</li>`).join('');
      const recs  = m.i18nRecs.map(r => `<li>${r}</li>`).join('');
      const prompt = `You are reviewing the ${m.display} module in auditboard-frontend for internationalization issues.\n\nTop risks identified:\n${m.i18nRisks.map(r => '- ' + r).join('\n')}\n\nRecommended fixes:\n${m.i18nRecs.map(r => '- ' + r).join('\n')}\n\nPlease help me address these i18n issues. Start by searching for the relevant files and then propose concrete code changes.`;
      return `
        <div class="drawer-section">
          <div class="drawer-section-title">Risks</div>
          <ul class="risk-list">${risks}</ul>
        </div>
        <div class="drawer-section">
          <div class="drawer-section-title">Recommendations</div>
          <ul class="rec-list">${recs}</ul>
        </div>
        <div class="drawer-section">
          <div class="drawer-section-title">Claude Code Prompt</div>
          <div style="margin-bottom:var(--space-s);">
            <button class="prompt-copy-btn" onclick="copyPrompt(this, ${JSON.stringify(prompt)})">Copy prompt</button>
          </div>
          <pre class="prompt-pre prompt-collapsed">${prompt}</pre>
          <button class="prompt-toggle" onclick="togglePrompt(this)">Show more ›</button>
        </div>
      `;
    }

    function buildTokensBody(m) {
      const t = m.tokens;
      const maxViol = Math.max(...Object.values(t.by_cat), 1);
      const catBars = ['color','space','radius','typography'].map(cat => {
        const v = t.by_cat[cat] || 0;
        const pct = Math.round((v / maxViol) * 100);
        return `<div class="cat-bar-row">
          <div class="cat-bar-label">${cat.charAt(0).toUpperCase() + cat.slice(1)}</div>
          <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
          <div class="cat-bar-count">${v}</div>
        </div>`;
      }).join('');
      const fileRows = t.top_files.length > 0
        ? t.top_files.map(f => `<div class="token-file-row"><span class="token-file-path">${f.path.replace('apps/client/app/components/','')}</span><span class="badge badge--danger">${f.violations}</span></div>`).join('')
        : `<div style="font-size:var(--text-xs);color:var(--color-subdued);">No violations detected.</div>`;
      const prompt = `You are reviewing the ${m.display} module in auditboard-frontend for Luna design token adoption.\n\nToken score: ${t.score}% (${t.violations} violations, ${t.token_usages} token usages across ${t.css_files} CSS files)\n\nTop violation files:\n${t.top_files.map(f => '- ' + f.path + ' (' + f.violations + ' violations)').join('\n') || 'None'}\n\nPlease help me migrate the hardcoded spacing values in these files to use var(--luna-space-*) tokens. Start with the highest-violation file.`;
      return `
        <div class="drawer-section">
          <div class="drawer-section-title">Stats</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-m);">
            <div class="stat-card"><div class="stat-card__label">Score</div><div class="stat-card__value" style="color:${scoreColor(t.score)}">${t.score}%</div></div>
            <div class="stat-card"><div class="stat-card__label">Violations</div><div class="stat-card__value" style="color:var(--color-danger)">${t.violations}</div></div>
            <div class="stat-card"><div class="stat-card__label">Token Usages</div><div class="stat-card__value" style="color:var(--color-success)">${t.token_usages}</div></div>
          </div>
        </div>
        <div class="drawer-section">
          <div class="drawer-section-title">Violations by Category</div>
          ${catBars}
        </div>
        ${t.top_files.length > 0 ? `
        <div class="drawer-section">
          <div class="drawer-section-title">Top Violation Files</div>
          ${fileRows}
        </div>` : ''}
        <div class="drawer-section">
          <div class="drawer-section-title">Claude Code Prompt</div>
          <div style="margin-bottom:var(--space-s);">
            <button class="prompt-copy-btn" onclick="copyPrompt(this, ${JSON.stringify(prompt)})">Copy prompt</button>
          </div>
          <pre class="prompt-pre prompt-collapsed">${prompt}</pre>
          <button class="prompt-toggle" onclick="togglePrompt(this)">Show more ›</button>
        </div>
      `;
    }

    function openDrawer(name, facet) {
      const m = MODULES.find(x => x.name === name);
      if (!m) return;
      let headerHtml = '';
      let bodyHtml = '';

      if (facet === 'a11y') {
        headerHtml = `
          <div>
            <div style="font-size:var(--text-xs);color:var(--color-subdued);margin-bottom:var(--space-xs);">${m.display}</div>
            <h4 style="display:flex;align-items:center;gap:var(--space-s);">Accessibility <span class="badge ${scoreBadgeClass(m.a11y)}">${m.a11y}</span></h4>
          </div>
          <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
        `;
        bodyHtml = buildA11yBody(m);
      } else if (facet === 'i18n') {
        headerHtml = `
          <div>
            <div style="font-size:var(--text-xs);color:var(--color-subdued);margin-bottom:var(--space-xs);">${m.display}</div>
            <h4 style="display:flex;align-items:center;gap:var(--space-s);">Internationalization <span class="badge ${scoreBadgeClass(m.i18n)}">${m.i18n}</span></h4>
          </div>
          <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
        `;
        bodyHtml = buildI18nBody(m);
      } else if (facet === 'tokens' && m.tokens) {
        headerHtml = `
          <div>
            <div style="font-size:var(--text-xs);color:var(--color-subdued);margin-bottom:var(--space-xs);">${m.display}</div>
            <h4 style="display:flex;align-items:center;gap:var(--space-s);">Luna Token Adoption <span class="badge ${scoreBadgeClass(m.tokens.score)}">${m.tokens.score}%</span></h4>
          </div>
          <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
        `;
        bodyHtml = buildTokensBody(m);
      }

      document.getElementById('drawerHeader').innerHTML = headerHtml;
      document.getElementById('drawerBody').innerHTML = bodyHtml;
      document.getElementById('drawerOverlay').classList.add('open');
      document.getElementById('drawer').classList.add('open');
    }

    function openDrawerAvg(facet) {
      let headerHtml = '';
      let bodyHtml = '';

      if (facet === 'a11y') {
        headerHtml = `
          <div>
            <div style="font-size:var(--text-xs);color:var(--color-subdued);margin-bottom:var(--space-xs);">All 13 Modules</div>
            <h4 style="display:flex;align-items:center;gap:var(--space-s);">Accessibility Average <span class="badge ${scoreBadgeClass(avgA11y)}">${avgA11y}</span></h4>
          </div>
          <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
        `;
        const sorted = [...MODULES].sort((a, b) => a.a11y - b.a11y);
        const rows = sorted.map(m => `
          <tr style="cursor:pointer;" onclick="closeDrawer();setTimeout(()=>openDrawer('${m.name}','a11y'),200)">
            <td><div class="module-name">${m.name}</div></td>
            <td>${scoreBadge(m.a11y)}</td>
            <td style="font-size:var(--text-xs);color:var(--color-subdued);">${m.a11yRisks[0]}</td>
          </tr>
        `).join('');
        bodyHtml = `
          <div class="drawer-section">
            <div class="drawer-section-title">All Module Scores (A11y)</div>
            <div style="overflow-x:auto;">
              <table style="width:100%;border-collapse:collapse;">
                <thead><tr>
                  <th style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-subdued);padding:var(--space-s) var(--space-m);border-bottom:2px solid #E3E8F2;text-align:left;">Module</th>
                  <th style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-subdued);padding:var(--space-s) var(--space-m);border-bottom:2px solid #E3E8F2;text-align:left;">Score</th>
                  <th style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-subdued);padding:var(--space-s) var(--space-m);border-bottom:2px solid #E3E8F2;text-align:left;">Top Risk</th>
                </tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        `;
      } else if (facet === 'i18n') {
        headerHtml = `
          <div>
            <div style="font-size:var(--text-xs);color:var(--color-subdued);margin-bottom:var(--space-xs);">All 13 Modules</div>
            <h4 style="display:flex;align-items:center;gap:var(--space-s);">i18n Average <span class="badge ${scoreBadgeClass(avgI18n)}">${avgI18n}</span></h4>
          </div>
          <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
        `;
        const sorted = [...MODULES].sort((a, b) => a.i18n - b.i18n);
        const rows = sorted.map(m => `
          <tr style="cursor:pointer;" onclick="closeDrawer();setTimeout(()=>openDrawer('${m.name}','i18n'),200)">
            <td><div class="module-name">${m.name}</div></td>
            <td>${scoreBadge(m.i18n)}</td>
            <td style="font-size:var(--text-xs);color:var(--color-subdued);">${m.i18nRisks[0]}</td>
          </tr>
        `).join('');
        bodyHtml = `
          <div class="drawer-section">
            <div class="drawer-section-title">All Module Scores (i18n)</div>
            <div style="overflow-x:auto;">
              <table style="width:100%;border-collapse:collapse;">
                <thead><tr>
                  <th style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-subdued);padding:var(--space-s) var(--space-m);border-bottom:2px solid #E3E8F2;text-align:left;">Module</th>
                  <th style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-subdued);padding:var(--space-s) var(--space-m);border-bottom:2px solid #E3E8F2;text-align:left;">Score</th>
                  <th style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-subdued);padding:var(--space-s) var(--space-m);border-bottom:2px solid #E3E8F2;text-align:left;">Top Risk</th>
                </tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        `;
      } else if (facet === 'tokens') {
        headerHtml = `
          <div>
            <div style="font-size:var(--text-xs);color:var(--color-subdued);margin-bottom:var(--space-xs);">${tokenModules.length} Scanned Modules</div>
            <h4 style="display:flex;align-items:center;gap:var(--space-s);">Luna Token Average <span class="badge ${scoreBadgeClass(avgTokens)}">${avgTokens}%</span></h4>
          </div>
          <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
        `;
        const sorted = [...tokenModules].sort((a, b) => a.tokens.score - b.tokens.score);
        const rows = sorted.map(m => `
          <tr style="cursor:pointer;" onclick="closeDrawer();setTimeout(()=>openDrawer('${m.name}','tokens'),200)">
            <td><div class="module-name">${m.name}</div></td>
            <td>${scoreBadge(m.tokens.score)}</td>
            <td class="numeric" style="font-size:var(--text-xs);color:var(--color-subdued);">${m.tokens.violations}</td>
            <td class="numeric" style="font-size:var(--text-xs);color:var(--color-subdued);">${m.tokens.css_files}</td>
          </tr>
        `).join('');
        bodyHtml = `
          <div class="drawer-section">
            <div class="drawer-section-title">All Module Scores (Luna Tokens)</div>
            <div style="overflow-x:auto;">
              <table style="width:100%;border-collapse:collapse;">
                <thead><tr>
                  <th style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-subdued);padding:var(--space-s) var(--space-m);border-bottom:2px solid #E3E8F2;text-align:left;">Module</th>
                  <th style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-subdued);padding:var(--space-s) var(--space-m);border-bottom:2px solid #E3E8F2;text-align:left;">Score</th>
                  <th style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-subdued);padding:var(--space-s) var(--space-m);border-bottom:2px solid #E3E8F2;text-align:right;">Violations</th>
                  <th style="font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--color-subdued);padding:var(--space-s) var(--space-m);border-bottom:2px solid #E3E8F2;text-align:right;">CSS Files</th>
                </tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        `;
      }

      document.getElementById('drawerHeader').innerHTML = headerHtml;
      document.getElementById('drawerBody').innerHTML = bodyHtml;
      document.getElementById('drawerOverlay').classList.add('open');
      document.getElementById('drawer').classList.add('open');
    }

    function closeDrawer() {
      document.getElementById('drawerOverlay').classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

    function copyPrompt(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.innerHTML;
        btn.innerHTML = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 2000);
      });
    }

    function togglePrompt(btn) {
      const pre = btn.previousElementSibling;
      if (pre.classList.contains('prompt-collapsed')) {
        pre.classList.remove('prompt-collapsed');
        btn.textContent = 'Show less \u2039';
      } else {
        pre.classList.add('prompt-collapsed');
        btn.textContent = 'Show more \u203a';
      }
    }
  </script>

</body>
</html>
