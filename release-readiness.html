<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Release Readiness: AuditBoard Frontend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #0B64DD;
      --color-primary-bg: #F1F6FF;
      --color-accent: #BC1E70;
      --color-accent-secondary: #008B87;
      --color-success: #008A5E;
      --color-success-bg: #E6F5F0;
      --color-warning: #FACB3D;
      --color-warning-text: #825803;
      --color-warning-bg: #FFF8E1;
      --color-danger: #C61E25;
      --color-danger-bg: #FDECEA;
      --color-ink: #1A1C21;
      --color-paragraph: #343741;
      --color-subdued: #646A76;
      --color-light-shade: #E3E8F2;
      --color-lightest-shade: #F5F7FA;
      --color-empty-shade: #FFFFFF;
      --font-body: 'Inter', BlinkMacSystemFont, Helvetica, Arial, sans-serif;
      --font-mono: 'Roboto Mono', Menlo, Courier, monospace;
      --font-weight-regular: 400;
      --font-weight-medium: 450;
      --font-weight-semibold: 500;
      --font-weight-bold: 600;
      --text-xs: 0.857rem;
      --text-s:  1.000rem;
      --text-m:  1.143rem;
      --text-l:  1.429rem;
      --text-xl: 1.714rem;
      --text-xxl: 2.143rem;
      --line-height-xs: 1.429rem;
      --line-height-s:  1.714rem;
      --line-height-m:  2.000rem;
      --space-xxs: 2px;
      --space-xs:  4px;
      --space-s:   8px;
      --space-m:   12px;
      --space-base: 16px;
      --space-l:   24px;
      --space-xl:  32px;
      --space-xxl: 40px;
      --space-xxxl: 48px;
      --border-thin: 1px solid #E3E8F2;
      --border-thick: 2px solid #E3E8F2;
      --border-radius: 4px;
      --shadow-s: 0 1px 3px hsla(217,30%,24%,.10), 0 4px 8px hsla(217,30%,24%,.07);
      --page-max-width: 1100px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); font-size: var(--text-s); font-weight: var(--font-weight-regular); line-height: var(--line-height-s); color: var(--color-paragraph); background: var(--color-lightest-shade); -webkit-font-smoothing: antialiased; }
    h4 { font-size: var(--text-m); font-weight: var(--font-weight-semibold); color: var(--color-ink); }
    a { color: var(--color-primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page-header { background: var(--color-empty-shade); border-bottom: var(--border-thin); padding: var(--space-l) 0; }
    .page-header-inner { max-width: var(--page-max-width); margin: 0 auto; padding: 0 var(--space-l); }
    .breadcrumb { font-size: var(--text-xs); color: var(--color-subdued); margin-bottom: var(--space-xs); }
    .breadcrumb a { color: var(--color-primary); }
    .page-header h1 { font-size: var(--text-l); font-weight: var(--font-weight-semibold); color: var(--color-ink); }
    .page-header p { font-size: var(--text-xs); color: var(--color-subdued); margin-top: var(--space-xs); }

    .page-body { max-width: var(--page-max-width); margin: 0 auto; padding: var(--space-l); }

    .badge { display: inline-flex; align-items: center; font-size: var(--text-xs); font-weight: var(--font-weight-semibold); padding: 2px var(--space-s); border-radius: var(--border-radius); line-height: 1.5; white-space: nowrap; }
    .badge--default { background: var(--color-lightest-shade); color: var(--color-subdued); border: var(--border-thin); }
    .badge--success { background: var(--color-success-bg); color: var(--color-success); }
    .badge--warning { background: var(--color-warning-bg); color: var(--color-warning-text); }
    .badge--danger  { background: var(--color-danger-bg);  color: var(--color-danger); }
    .badge--na      { background: var(--color-lightest-shade); color: var(--color-subdued); border: var(--border-thin); font-style: italic; }

    .panel { background: var(--color-empty-shade); border: var(--border-thin); border-radius: var(--border-radius); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: var(--space-m) var(--space-l); border-bottom: var(--border-thin); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: var(--text-s); }
    thead th { font-size: calc(var(--text-xs) * 1.5); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-subdued); text-align: left; padding: var(--space-xl) var(--space-m); border-bottom: var(--border-thick); white-space: normal; }
    thead th .th-inner { display: flex; align-items: flex-start; gap: var(--space-xs); flex-wrap: nowrap; }
    thead th .th-icon { padding-top: 0.15em; }
    thead th .th-icon { flex-shrink: 0; opacity: 0.7; }
    thead th .th-icon svg { width: 1.3em; height: 1.3em; }
    tbody td { padding: var(--space-m); border-bottom: var(--border-thin); vertical-align: middle; color: var(--color-paragraph); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr.data-row:hover { background: var(--color-lightest-shade); }

    /* Score buttons */
    .score-btn { display: inline-flex; align-items: center; gap: 4px; font-size: var(--text-xs); font-weight: var(--font-weight-semibold); padding: 3px var(--space-s); border-radius: var(--border-radius); line-height: 1.5; border: none; cursor: pointer; font-family: var(--font-body); transition: opacity 0.12s, box-shadow 0.12s; }
    .score-btn:hover { opacity: 0.82; box-shadow: 0 1px 2px hsla(217,30%,24%,.08), 0 2px 4px hsla(217,30%,24%,.06); }
    .score-btn.success { background: var(--color-success-bg); color: var(--color-success); }
    .score-btn.warning { background: var(--color-warning-bg); color: var(--color-warning-text); }
    .score-btn.danger  { background: var(--color-danger-bg);  color: var(--color-danger); }
    .score-btn.null-score { background: var(--color-lightest-shade); color: var(--color-subdued); border: var(--border-thin); cursor: default; }
    .score-btn.null-score:hover { opacity: 1; box-shadow: none; }

    /* Average row */
    tr.avg-row td { background: var(--color-lightest-shade); border-bottom: var(--border-thick); padding: var(--space-xl) var(--space-m); }
    .avg-row__label { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-subdued); }
    .avg-score { display: flex; flex-direction: column; align-items: flex-start; gap: var(--space-xs); }
    .avg-score__value { font-size: var(--text-xxl); font-weight: var(--font-weight-semibold); font-variant-numeric: tabular-nums; line-height: 1; }

    .module-name { font-weight: var(--font-weight-semibold); color: var(--color-ink); }

    /* Drawer */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(7,16,31,0.55); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(2px); }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 50%; left: 50%; width: 92%; max-width: 960px; max-height: 88vh; background: var(--color-empty-shade); border: var(--border-thin); border-radius: 10px; box-shadow: 0 24px 64px hsla(217,30%,10%,.28), 0 4px 16px hsla(217,30%,24%,.14); z-index: 101; transform: translate(-50%, -50%) scale(0.96); opacity: 0; pointer-events: none; transition: transform 0.2s cubic-bezier(.34,1.3,.64,1), opacity 0.15s; overflow-y: auto; display: flex; flex-direction: column; }
    .drawer.open { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
    .drawer-header { position: sticky; top: 0; background: var(--color-empty-shade); border-bottom: var(--border-thin); padding: var(--space-l); display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-m); z-index: 1; border-radius: 10px 10px 0 0; }
    .drawer-header-title h3 { font-size: var(--text-m); font-weight: var(--font-weight-semibold); color: var(--color-ink); }
    .drawer-header-title .drawer-subtitle { font-size: var(--text-xs); color: var(--color-subdued); margin-top: 2px; }
    .drawer-close { background: none; border: none; cursor: pointer; color: var(--color-subdued); font-size: 20px; padding: var(--space-xs); border-radius: var(--border-radius); line-height: 1; flex-shrink: 0; }
    .drawer-close:hover { background: var(--color-lightest-shade); color: var(--color-ink); }
    .drawer-body { padding: var(--space-l); flex: 1; }
    .drawer-section { margin-bottom: var(--space-xl); }
    .drawer-section:last-child { margin-bottom: 0; }
    .drawer-section-title { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-ink); margin-bottom: var(--space-m); padding-bottom: var(--space-s); border-bottom: var(--border-thin); }
    .drawer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-l); }
    @media (max-width: 640px) { .drawer-grid { grid-template-columns: 1fr; } }
    .drawer-col-label { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-subdued); margin-bottom: var(--space-s); }
    .risk-list { list-style: none; padding: 0; margin: 0; }
    .risk-list li { font-size: var(--text-xs); color: var(--color-paragraph); padding: var(--space-xs) 0 var(--space-xs) var(--space-m); border-bottom: var(--border-thin); position: relative; line-height: var(--line-height-s); }
    .risk-list li:last-child { border-bottom: none; }
    .risk-list li::before { content: ''; position: absolute; left: 4px; top: 10px; width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.4; }
    .token-file-list { list-style: none; padding: 0; margin: 0; }
    .token-file-item { display: flex; align-items: center; justify-content: space-between; padding: var(--space-xs) 0; border-bottom: var(--border-thin); gap: var(--space-m); }
    .token-file-item:last-child { border-bottom: none; }
    .token-file-path { font-family: var(--font-mono); font-size: 0.78rem; color: var(--color-paragraph); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .token-file-stats { display: flex; gap: var(--space-s); flex-shrink: 0; }
    .callout { border-radius: var(--border-radius); padding: var(--space-m) var(--space-l); border-left: 4px solid; margin-bottom: var(--space-m); }
    .callout--info    { background: var(--color-primary-bg); border-color: var(--color-primary); }
    .callout--success { background: var(--color-success-bg); border-color: var(--color-success); }
    .callout--warning { background: var(--color-warning-bg); border-color: var(--color-warning); }
    .callout--danger  { background: var(--color-danger-bg);  border-color: var(--color-danger); }
    .callout__title { font-size: var(--text-s); font-weight: var(--font-weight-semibold); margin-bottom: var(--space-xs); color: var(--color-ink); }
    .callout__body { font-size: var(--text-s); color: var(--color-paragraph); }
    .code-example { background: var(--color-lightest-shade); border: var(--border-thin); border-radius: var(--border-radius); padding: var(--space-m); font-family: var(--font-mono); font-size: var(--text-xs); }
    .code-before { color: var(--color-danger); }
    .code-after  { color: var(--color-success); }
    .prompt-pre { font-size: var(--text-xs); line-height: 1.65; background: var(--color-lightest-shade); border: var(--border-thin); border-radius: var(--border-radius); padding: var(--space-m) var(--space-l); white-space: pre-wrap; word-break: break-word; color: var(--color-paragraph); font-family: var(--font-body); overflow: hidden; }
    .prompt-pre.prompt-collapsed { max-height: 4.95em; }
    .prompt-toggle { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; color: var(--color-primary); font-size: var(--text-xs); cursor: pointer; padding: var(--space-xs) 0; font-family: var(--font-body); font-weight: var(--font-weight-semibold); margin-top: var(--space-xs); }
    .prompt-toggle:hover { text-decoration: underline; }
    .prompt-copy-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: var(--border-thin); border-radius: var(--border-radius); color: var(--color-primary); font-size: var(--text-xs); font-family: var(--font-body); font-weight: var(--font-weight-semibold); cursor: pointer; padding: 2px var(--space-s); transition: all 0.15s; }
    .prompt-copy-btn:hover { background: var(--color-primary-bg); }
    .prompt-copy-btn.copied { color: var(--color-success); border-color: var(--color-success); background: var(--color-success-bg); }
    .drawer-section-title { display: flex; align-items: center; gap: var(--space-s); }
    .drawer-section-title svg { color: var(--color-primary); flex-shrink: 0; }
  </style>
</head>
<body>

          const ta = document.createElement('textarea'); ta.value = _currentPrompt;
          ta.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(ta);
          ta.select(); document.execCommand('copy'); document.body.removeChild(ta); succeed();
        });
      } else {
        const ta = document.createElement('textarea'); ta.value = _currentPrompt;
        ta.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta); succeed();
      }
    }

    function togglePrompt(btn) {
      const pre = btn.previousElementSibling;
      const nowCollapsed = pre.classList.toggle('prompt-collapsed');
      const svgDown = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
      const svgUp = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>';
      btn.innerHTML = nowCollapsed ? svgDown + ' Show full prompt' : svgUp + ' Collapse';
    }

    function promptSection() {
      const svgTerminal = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>';
      const svgCopy = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      const svgDown = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
      const ep = _currentPrompt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return '<div class="drawer-section">' +
        '<div class="drawer-section-title">' + svgTerminal + 'Suggested Claude Code Prompt' +
          '<button class="prompt-copy-btn" onclick="copyPromptBtn(this)">' + svgCopy + ' Copy</button>' +
        '</div>' +
        '<pre class="prompt-pre prompt-collapsed">' + ep + '</pre>' +
        '<button class="prompt-toggle" onclick="togglePrompt(this)">' + svgDown + ' Show full prompt</button>' +
      '</div>';
    }

    // ---- Lightbox content builders ----
    function buildA11yContent(m) {
      const band = scoreBadgeClass(m.a11y).replace('badge--','');
      const calloutType = m.a11y >= 80 ? 'success' : m.a11y >= 65 ? 'warning' : 'danger';
      const risks = m.a11yRisks.map(function(r) { return '<li>' + escHtml(r) + '</li>'; }).join('');
      const recs  = m.a11yRecs.map(function(r) { return '<li>' + escHtml(r) + '</li>'; }).join('');
      _currentPrompt = buildA11yPrompt(m);
      return '<div class="callout callout--' + calloutType + '" style="margin-bottom:var(--space-l);">' +
          '<div class="callout__title">Score: ' + m.a11y + '/100 (Grade ' + letterGrade(m.a11y) + ')</div>' +
          '<div class="callout__body">Evaluates ARIA usage, keyboard accessibility, focus management, and screen reader support across the module\'s templates and components.</div>' +
        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">' +
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
            'Findings' +
          '</div>' +
          '<div class="drawer-grid">' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-danger);">Risks</div>' +
              '<ul class="risk-list" style="color:var(--color-danger);">' + risks + '</ul>' +
            '</div>' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-success);">Recommendations</div>' +
              '<ul class="risk-list" style="color:var(--color-success);">' + recs + '</ul>' +
            '</div>' +
          '</div>' +
        '</div>' +
        promptSection();
    }

    function buildI18nContent(m) {
      const calloutType = m.i18n >= 80 ? 'success' : m.i18n >= 65 ? 'warning' : 'danger';
      const risks = m.i18nRisks.map(function(r) { return '<li>' + escHtml(r) + '</li>'; }).join('');
      const recs  = m.i18nRecs.map(function(r) { return '<li>' + escHtml(r) + '</li>'; }).join('');
      _currentPrompt = buildI18nPrompt(m);
      return '<div class="callout callout--' + calloutType + '" style="margin-bottom:var(--space-l);">' +
          '<div class="callout__title">Score: ' + m.i18n + '/100 (Grade ' + letterGrade(m.i18n) + ')</div>' +
          '<div class="callout__body">Evaluates use of <code>formatMessage</code>, ICU patterns, Applanga context notes, and absence of hardcoded user-visible strings.</div>' +
        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">' +
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
            'Findings' +
          '</div>' +
          '<div class="drawer-grid">' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-danger);">Risks</div>' +
              '<ul class="risk-list" style="color:var(--color-danger);">' + risks + '</ul>' +
            '</div>' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-success);">Recommendations</div>' +
              '<ul class="risk-list" style="color:var(--color-success);">' + recs + '</ul>' +
            '</div>' +
          '</div>' +
        '</div>' +
        promptSection();
    }

    function buildTokensContent(m) {
      if (m.tokens === null) {
        _currentPrompt = '';
        return '<div class="callout callout--info">' +
          '<div class="callout__title">Not Scored</div>' +
          '<div class="callout__body">The <strong>' + escHtml(m.name) + '</strong> module does not have a Luna Token Adoption score. Workspace and site-configuration delegate CSS to sub-modules and shared libraries.</div>' +
        '</div>';
      }
      const t = m.tokens;
      const total = t.token_usages + t.violations;
      const scoreExplain = total === 0
        ? 'This module has no CSS files with scannable properties.'
        : t.violations.toLocaleString() + ' out of ' + total.toLocaleString() + ' relevant CSS declarations use hardcoded values instead of Luna design tokens. Replacing these would raise the score to 100%.';
      const catParts = [];
      if (t.by_cat.space > 0)      catParts.push(t.by_cat.space + ' space/size');
      if (t.by_cat.color > 0)      catParts.push(t.by_cat.color + ' color');
      if (t.by_cat.radius > 0)     catParts.push(t.by_cat.radius + ' radius');
      if (t.by_cat.typography > 0) catParts.push(t.by_cat.typography + ' typography');
      const catBreakdown = catParts.length > 0 ? ' Violations by category: ' + catParts.join(', ') + '.' : '';
      const calloutType = t.score >= 80 ? 'success' : t.score >= 50 ? 'warning' : 'danger';

      let html = '<div class="callout callout--' + calloutType + '" style="margin-bottom:var(--space-l);">' +
        '<div class="callout__title">Score: ' + t.score + '% (Grade ' + letterGrade(t.score) + ')</div>' +
        '<div class="callout__body">' + scoreExplain + catBreakdown + '</div>' +
      '</div>';

      // How to improve
      const tips = [];
      if (t.by_cat.space > 0) tips.push({
        title: 'Replace hardcoded spacing values',
        body: 'Margin, padding, gap, and size properties are using raw pixel or rem values. Swapping them for Luna space tokens is typically the highest-impact change and improves consistency across the app.',
        before: 'margin: 16px;\npadding: 8px 24px;\ngap: 12px;',
        after: 'margin: var(--luna-space-base);\npadding: var(--luna-space-s) var(--luna-space-l);\ngap: var(--luna-space-m);',
        color: 'var(--color-warning)',
      });
      if (t.by_cat.color > 0) tips.push({
        title: 'Replace hardcoded hex colors',
        body: 'Color, background, and border properties use hex values that map to Luna color tokens.',
        before: 'color: #343741;\nbackground-color: #F5F7FA;\nborder-color: #E3E8F2;',
        after: 'color: var(--luna-color-paragraph);\nbackground-color: var(--luna-color-lightest-shade);\nborder-color: var(--luna-color-light-shade);',
        color: 'var(--color-danger)',
      });
      if (t.by_cat.radius > 0) tips.push({
        title: 'Replace hardcoded border-radius values',
        body: 'Border-radius properties use raw pixel values that map to Luna radius tokens.',
        before: 'border-radius: 4px;\nborder-radius: 8px;',
        after: 'border-radius: var(--luna-radius-s);\nborder-radius: var(--luna-radius-m);',
        color: 'var(--color-primary)',
      });

      if (tips.length > 0) {
        const svgBulb = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14z"/></svg>';
        html += '<div class="drawer-section"><div class="drawer-section-title">' + svgBulb + 'How to Improve</div>';
        tips.forEach(function(tip) {
          html += '<div style="margin-bottom:var(--space-l);padding:var(--space-m);border:var(--border-thin);border-left:3px solid ' + tip.color + ';border-radius:var(--border-radius);">';
          html += '<div style="font-weight:var(--font-weight-semibold);font-size:var(--text-s);margin-bottom:var(--space-xs);">' + tip.title + '</div>';
          html += '<p class="text-xs text-subdued" style="margin-bottom:var(--space-s);">' + tip.body + '</p>';
          html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-s);">';
          html += '<div><div class="text-xs" style="color:var(--color-danger);font-weight:600;margin-bottom:2px;">Before</div>';
          html += '<div class="code-example"><span class="code-before">' + tip.before.replace(/\n/g,'<br>') + '</span></div></div>';
          html += '<div><div class="text-xs" style="color:var(--color-success);font-weight:600;margin-bottom:2px;">After</div>';
          html += '<div class="code-example"><span class="code-after">' + tip.after.replace(/\n/g,'<br>') + '</span></div></div>';
          html += '</div></div>';
        });
        html += '</div>';
      }

      // Quick wins
      if (t.top_files && t.top_files.length > 0) {
        const quickWins = t.top_files.filter(function(f) { return f.violations >= 1 && f.violations <= 3; });
        if (quickWins.length > 0) {
          const svgZap = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>';
          html += '<div class="callout callout--success" style="margin-bottom:var(--space-l);">';
          html += '<div class="callout__title">' + svgZap + 'Quick Wins</div>';
          html += '<div class="callout__body">These files each have 3 or fewer violations. Fixing them is fast and raises your score immediately.<br><br>';
          quickWins.forEach(function(f) {
            const parts = f.path.split('/');
            const short = parts.slice(-2).join('/');
            html += '<span class="text-mono" style="display:inline-block;margin-right:var(--space-m);margin-bottom:var(--space-xs);">' + escHtml(short) + '</span>';
            html += '<span class="badge badge--warning" style="margin-right:var(--space-l);">' + f.violations + ' violation' + (f.violations !== 1 ? 's' : '') + '</span><br>';
          });
          html += '</div></div>';
        }
      }

      _currentPrompt = buildTokenPrompt(m);
      html += promptSection();

      // Top offending files
      if (t.top_files && t.top_files.length > 0) {
        const svgFile = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
        html += '<div class="drawer-section"><div class="drawer-section-title">' + svgFile + 'Top Offending Files</div>';
        html += '<table style="font-size:var(--text-xs);width:100%;"><thead><tr>';
        html += '<th style="text-align:left;padding:var(--space-xs) var(--space-s);border-bottom:var(--border-thick);color:var(--color-subdued);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">File</th>';
        html += '<th style="text-align:right;padding:var(--space-xs) var(--space-s);border-bottom:var(--border-thick);color:var(--color-subdued);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">Violations</th>';
        html += '</tr></thead><tbody>';
        t.top_files.forEach(function(f) {
          const parts = f.path.split('/');
          const short = parts.slice(-2).join('/');
          html += '<tr><td style="padding:var(--space-xs) var(--space-s);border-bottom:var(--border-thin);font-family:var(--font-mono);word-break:break-all;" title="' + escHtml(f.path) + '">' + escHtml(short) + '</td>';
          html += '<td style="text-align:right;padding:var(--space-xs) var(--space-s);border-bottom:var(--border-thin);color:var(--color-danger);font-weight:600;">' + f.violations + '</td></tr>';
        });
        html += '</tbody></table></div>';
      }

      return html;
    }

    function buildSmartFormsPrompt(m) {
      if (!m.smartForms || m.smartForms.score === null) return '';
      const L = [];
      L.push('Fix the following Smart Forms governance violations in the ' + m.display + ' module of auditboard-frontend.');
      L.push('Repo root: /Users/jcarpenter/Git Repositories/auditboard-frontend');
      L.push('Current compliance score: ' + m.smartForms.score + '/100 (' + letterGrade(m.smartForms.score) + ')');
      L.push('');
      L.push('GOVERNANCE RULES (non-negotiable):');
      L.push('- All user-facing forms must use @auditboard/schema-form. Import SchemaForm or use schemaFormEngineResource.');
      L.push('- LunaFormGroup from @auditboard/legacy-design-system must not be used for any governed form.');
      L.push('- Create forms (modals for creating new records): row layout (labels above inputs), submit-group validation on click, always-enabled submit button, bordered inputs.');
      L.push('- Click-to-edit forms (detail pages, quickviews): column layout (labels left of inputs), blur-save per field, transparent inputs.');
      L.push('- FormBehavior subclasses live in apps/client/app/smart-form/<module>/.');
      L.push('');
      L.push('VIOLATIONS FOUND:');
      m.smartForms.risks.forEach(function(r) { L.push('- ' + r); });
      L.push('');
      L.push('REQUIRED CHANGES (implement each one):');
      m.smartForms.recs.forEach(function(r) { L.push('- ' + r); });
      L.push('');
      L.push('HOW TO PROCEED:');
      L.push('1. Grep for LunaFormGroup in the module\'s component and route directories to locate every legacy form.');
      L.push('2. Read each file identified. Understand the form\'s purpose: is it a create modal or a detail/edit view?');
      L.push('3. For each governed form, replace LunaFormGroup with the appropriate SchemaForm pattern.');
      L.push('   - Create modal: use schemaFormEngineResource + <SchemaForm @engine={{this.engine}}> with a FormBehavior subclass in apps/client/app/smart-form/' + m.name + '/.');
      L.push('   - Detail view: use schemaFormEngineResource in the component class; render <SchemaForm> in the template.');
      L.push('4. Remove the @disabled condition from any submit button. Show validation errors on submit instead of blocking the button.');
      L.push('5. After changes, run: grep -r "LunaFormGroup" apps/client/app/components/ apps/client/app/routes/ | grep ' + m.name);
      L.push('   Confirm zero results for this module before finishing.');
      return L.join('\n');
    }

    function buildSmartFormsContent(m) {
      if (!m.smartForms) {
        _currentPrompt = '';
        return '<div class="callout callout--warning">' +
          '<div class="callout__title">Not Yet Evaluated</div>' +
          '<div class="callout__body">Smart Forms scores have not been generated for this module yet. Run <code>eval-coordinator</code> or <code>eval-smart-forms</code> against the auditboard-frontend repo to populate scores.</div>' +
        '</div>';
      }
      if (m.smartForms.score === null) {
        _currentPrompt = '';
        const svgInfo = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;color:var(--color-subdued);"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
        return '<div class="callout callout--success" style="margin-bottom:var(--space-l);">' +
          '<div class="callout__title">Exempt from Smart Forms Governance</div>' +
          '<div class="callout__body">This module does not require Smart Forms adoption under the current governance policy.</div>' +
        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">' + svgInfo + 'Why This Module Is Exempt</div>' +
          '<p style="font-size:var(--text-xs);line-height:1.7;color:var(--color-paragraph);">' + escHtml(m.smartForms.reason) + '</p>' +
          '<p style="font-size:var(--text-xs);color:var(--color-subdued);margin-top:var(--space-s);">Approved exemptions: multi-step wizards, questionnaire surveys, assessment workflows, and read-only display modules. Re-evaluate if editable forms are added.</p>' +
        '</div>';
      }
      const sf = m.smartForms;
      const calloutType = sf.score >= 80 ? 'success' : sf.score >= 65 ? 'warning' : 'danger';
      const risks = sf.risks.map(function(r) { return '<li>' + escHtml(r) + '</li>'; }).join('');
      const recs  = sf.recs.map(function(r) { return '<li>' + escHtml(r) + '</li>'; }).join('');
      _currentPrompt = buildSmartFormsPrompt(m);
      return '<div class="callout callout--' + calloutType + '" style="margin-bottom:var(--space-l);">' +
          '<div class="callout__title">Score: ' + sf.score + '/100 (Grade ' + letterGrade(sf.score) + ')</div>' +
          '<div class="callout__body">Evaluates adoption of <code>@auditboard/schema-form</code>, migration away from LunaFormGroup, and compliance with AuditBoard Form Pattern guidelines (layout, validation, labeling).</div>' +
        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">' +
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
            'Findings' +
          '</div>' +
          '<div class="drawer-grid">' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-danger);">Risks</div>' +
              '<ul class="risk-list" style="color:var(--color-danger);">' + risks + '</ul>' +
            '</div>' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-success);">Recommendations</div>' +
              '<ul class="risk-list" style="color:var(--color-success);">' + recs + '</ul>' +
            '</div>' +
          '</div>' +
        '</div>' +
        promptSection();
    }

    // ---- Lightbox open/close ----
    function openDrawer(moduleName, facet) {
      const m = MODULES.find(function(x) { return x.name === moduleName; });
      if (!m) return;

      const scoreVal = facet === 'a11y' ? m.a11y
        : facet === 'i18n' ? m.i18n
        : facet === 'tokens' ? (m.tokens ? m.tokens.score : null)
        : (m.smartForms ? m.smartForms.score : null);
      const badgeClass = scoreVal !== null ? scoreBadgeClass(scoreVal) : 'badge--default';
      const facetLabel = facet === 'a11y' ? 'Accessibility' : facet === 'i18n' ? 'Internationalization' : facet === 'tokens' ? 'Luna Token Adoption' : 'Smart Forms';
      const scoreDisplay = scoreVal !== null ? (facet === 'tokens' ? scoreVal + '%' : scoreVal + '') : 'N/A';
      const gradeDisplay = scoreVal !== null ? letterGrade(scoreVal) : '';

      document.getElementById('drawerHeader').innerHTML =
        '<div>' +
          '<div style="font-size:var(--text-xs);color:var(--color-subdued);margin-bottom:var(--space-xs);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;">' + escHtml(m.display) + '</div>' +
          '<div style="font-size:var(--text-l);font-weight:var(--font-weight-semibold);color:var(--color-ink);margin-bottom:var(--space-s);">' + escHtml(m.name) + '</div>' +
          '<div style="display:flex;gap:var(--space-s);flex-wrap:wrap;">' +
            (scoreVal !== null ? '<span class="badge ' + badgeClass + '">' + scoreDisplay + '</span>' : '') +
            (gradeDisplay ? '<span class="badge ' + badgeClass + '">Grade ' + gradeDisplay + '</span>' : '') +
            (scoreVal === null && facet === 'smart-forms' && m.smartForms ? '<span class="badge badge--default">Exempt</span>' : '') +
            '<span class="badge badge--default">' + facetLabel + '</span>' +
          '</div>' +
        '</div>' +
        '<button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>';

      const body = document.getElementById('drawerBody');
      if (facet === 'a11y')              body.innerHTML = buildA11yContent(m);
      else if (facet === 'i18n')         body.innerHTML = buildI18nContent(m);
      else if (facet === 'tokens')       body.innerHTML = buildTokensContent(m);
      else if (facet === 'smart-forms')  body.innerHTML = buildSmartFormsContent(m);

      document.getElementById('drawer-overlay').classList.add('open');
      const drawer = document.getElementById('drawer');
      drawer.classList.add('open');
      drawer.focus();
      document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
      document.getElementById('drawer-overlay').classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDrawer(); });
  </script>

</body>
