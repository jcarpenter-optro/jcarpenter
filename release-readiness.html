      --color-danger: #C61E25;
      --color-danger-bg: #FDECEA;

      --color-paragraph: #343741;
      --color-subdued: #646A76;
      --color-light-shade: #E3E8F2;
      --color-lightest-shade: #F5F7FA;
      --color-empty-shade: #FFFFFF;

      --font-weight-regular: 400;
      --font-weight-medium: 450;
      --font-weight-semibold: 500;
      --font-weight-bold: 600;
      --text-xs: 0.857rem;
      --text-s:  1.000rem;
      --text-m:  1.143rem;
      --text-l:  1.429rem;
      --text-xl: 1.714rem;
      --text-xxl: 2.143rem;
      --line-height-xs: 1.429rem;
      --line-height-s:  1.714rem;
      --line-height-m:  2.000rem;
      --space-xxs: 2px;
      --space-xs:  4px;
      --space-s:   8px;
      --space-m:   12px;
      --space-base: 16px;
      --space-l:   24px;
      --space-xl:  32px;
      --space-xxl: 40px;
      --space-xxxl: 48px;
      --border-thin: 1px solid #E3E8F2;
      --border-thick: 2px solid #E3E8F2;
      --border-radius: 4px;
      --shadow-s: 0 1px 3px hsla(217,30%,24%,.10), 0 4px 8px hsla(217,30%,24%,.07);
      --page-max-width: 1100px;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); font-size: var(--text-s); font-weight: var(--font-weight-regular); line-height: var(--line-height-s); color: var(--color-paragraph); background: var(--color-lightest-shade); -webkit-font-smoothing: antialiased; }
    h4 { font-size: var(--text-m); font-weight: var(--font-weight-semibold); color: var(--color-ink); }
    a { color: var(--color-primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page-header { background: var(--color-empty-shade); border-bottom: var(--border-thin); padding: var(--space-l) 0; }
    .page-header-inner { max-width: var(--page-max-width); margin: 0 auto; padding: 0 var(--space-l); }
    .breadcrumb { font-size: var(--text-xs); color: var(--color-subdued); margin-bottom: var(--space-xs); }
    .breadcrumb a { color: var(--color-primary); }
    .page-header h1 { font-size: var(--text-l); font-weight: var(--font-weight-semibold); color: var(--color-ink); }
    .page-header p { font-size: var(--text-xs); color: var(--color-subdued); margin-top: var(--space-xs); }

    .page-body { max-width: var(--page-max-width); margin: 0 auto; padding: var(--space-l); }

    .badge { display: inline-flex; align-items: center; font-size: var(--text-xs); font-weight: var(--font-weight-semibold); padding: 2px var(--space-s); border-radius: var(--border-radius); line-height: 1.5; white-space: nowrap; }
    .badge--default { background: var(--color-lightest-shade); color: var(--color-subdued); border: var(--border-thin); }
    .badge--success { background: var(--color-success-bg); color: var(--color-success); }
    .badge--warning { background: var(--color-warning-bg); color: var(--color-warning-text); }
    .badge--danger  { background: var(--color-danger-bg);  color: var(--color-danger); }
    .badge--na      { background: var(--color-lightest-shade); color: var(--color-subdued); border: var(--border-thin); font-style: italic; }

    .panel { background: var(--color-empty-shade); border: var(--border-thin); border-radius: var(--border-radius); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: var(--space-m) var(--space-l); border-bottom: var(--border-thin); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: var(--text-s); }
    thead th { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-subdued); text-align: left; padding: var(--space-s) var(--space-m); border-bottom: var(--border-thick); white-space: nowrap; }
    tbody td { padding: var(--space-m); border-bottom: var(--border-thin); vertical-align: middle; color: var(--color-paragraph); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr.data-row:hover { background: var(--color-lightest-shade); }

    /* Score buttons */
    .score-btn { display: inline-flex; align-items: center; gap: 4px; font-size: var(--text-xs); font-weight: var(--font-weight-semibold); padding: 3px var(--space-s); border-radius: var(--border-radius); line-height: 1.5; border: none; cursor: pointer; font-family: var(--font-body); transition: opacity 0.12s, box-shadow 0.12s; }
    .score-btn:hover { opacity: 0.82; box-shadow: 0 1px 2px hsla(217,30%,24%,.08), 0 2px 4px hsla(217,30%,24%,.06); }
    .score-btn.success { background: var(--color-success-bg); color: var(--color-success); }
    .score-btn.warning { background: var(--color-warning-bg); color: var(--color-warning-text); }
    .score-btn.danger  { background: var(--color-danger-bg);  color: var(--color-danger); }
    .score-btn.null-score { background: var(--color-lightest-shade); color: var(--color-subdued); border: var(--border-thin); cursor: default; }
    .score-btn.null-score:hover { opacity: 1; box-shadow: none; }

    /* Average row */
    tr.avg-row td { background: var(--color-lightest-shade); border-bottom: var(--border-thick); padding: var(--space-xl) var(--space-m); }
    .avg-row__label { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-subdued); }
    .avg-score { display: flex; flex-direction: column; align-items: flex-start; gap: var(--space-xs); }
    .avg-score__value { font-size: var(--text-xxl); font-weight: var(--font-weight-semibold); font-variant-numeric: tabular-nums; line-height: 1; }

    .module-name { font-weight: var(--font-weight-semibold); color: var(--color-ink); }

    /* Drawer */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(7,16,31,0.55); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(2px); }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 50%; left: 50%; width: 92%; max-width: 960px; max-height: 88vh; background: var(--color-empty-shade); border: var(--border-thin); border-radius: 10px; box-shadow: 0 24px 64px hsla(217,30%,10%,.28), 0 4px 16px hsla(217,30%,24%,.14); z-index: 101; transform: translate(-50%, -50%) scale(0.96); opacity: 0; pointer-events: none; transition: transform 0.2s cubic-bezier(.34,1.3,.64,1), opacity 0.15s; overflow-y: auto; display: flex; flex-direction: column; }
    .drawer.open { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
    .drawer-header { position: sticky; top: 0; background: var(--color-empty-shade); border-bottom: var(--border-thin); padding: var(--space-l); display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-m); z-index: 1; border-radius: 10px 10px 0 0; }
    .drawer-header-title h3 { font-size: var(--text-m); font-weight: var(--font-weight-semibold); color: var(--color-ink); }
    .drawer-header-title .drawer-subtitle { font-size: var(--text-xs); color: var(--color-subdued); margin-top: 2px; }
    .drawer-close { background: none; border: none; cursor: pointer; color: var(--color-subdued); font-size: 20px; padding: var(--space-xs); border-radius: var(--border-radius); line-height: 1; flex-shrink: 0; }
    .drawer-close:hover { background: var(--color-lightest-shade); color: var(--color-ink); }
    .drawer-body { padding: var(--space-l); flex: 1; }
    .drawer-section { margin-bottom: var(--space-xl); }
    .drawer-section:last-child { margin-bottom: 0; }
    .drawer-section-title { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-ink); margin-bottom: var(--space-m); padding-bottom: var(--space-s); border-bottom: var(--border-thin); }
    .drawer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-l); }
    @media (max-width: 640px) { .drawer-grid { grid-template-columns: 1fr; } }
    .drawer-col-label { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-subdued); margin-bottom: var(--space-s); }
    .risk-list { list-style: none; padding: 0; margin: 0; }
    .risk-list li { font-size: var(--text-xs); color: var(--color-paragraph); padding: var(--space-xs) 0 var(--space-xs) var(--space-m); border-bottom: var(--border-thin); position: relative; line-height: var(--line-height-s); }
    .risk-list li:last-child { border-bottom: none; }
    .risk-list li::before { content: ''; position: absolute; left: 4px; top: 10px; width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.4; }
    .token-file-list { list-style: none; padding: 0; margin: 0; }
    .token-file-item { display: flex; align-items: center; justify-content: space-between; padding: var(--space-xs) 0; border-bottom: var(--border-thin); gap: var(--space-m); }
    .token-file-item:last-child { border-bottom: none; }
    .token-file-path { font-family: var(--font-mono); font-size: 0.78rem; color: var(--color-paragraph); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .token-file-stats { display: flex; gap: var(--space-s); flex-shrink: 0; }
    .callout { border-radius: var(--border-radius); padding: var(--space-m) var(--space-l); border-left: 4px solid; margin-bottom: var(--space-m); }
    .callout--info { background: var(--color-primary-bg); border-color: var(--color-primary); }
    .callout__title { font-size: var(--text-s); font-weight: var(--font-weight-semibold); margin-bottom: var(--space-xs); color: var(--color-ink); }
    .callout__body { font-size: var(--text-s); color: var(--color-paragraph); }
  </style>
</head>

            {path:'apps/client/app/components/module-risks/inventory/risk-entities/table-header.css',violations:6},
            {path:'apps/client/app/components/module-risks/inventory/hierarchy/table-header.css',violations:6},
            {path:'apps/client/app/components/module-risks/hierarchy/risk-tree/table-header.css',violations:5},
            {path:'apps/client/app/components/module-risks/shared/brackets/range-editor.css',violations:5},
            {path:'apps/client/app/components/module-risks/view/intake/intake.css',violations:5},
            {path:'apps/client/app/components/module-risks/intake/subsection.css',violations:4},
            {path:'apps/client/app/components/module-risks/inventory/risk-entities/node.css',violations:4},
            {path:'apps/client/app/components/module-risks/view/control-mapping/mapping-step-footer.css',violations:4}
          ]
        }
      },
      { name:'owner-dashboard', display:'Owner Dashboard',
        a11y:58, i18n:82,
        a11yRisks:['narratives-list.gjs uses {{on "click"}} on a Link; may not respond to Enter/Space as expected','0 aria-label attributes in sampled components'],
        a11yRecs:['Replace on "click" handler on Link with a Button component for the preview action','Add aria-label to narrative preview trigger identifying the specific narrative by title'],
        i18nRisks:['ICU select covers 4 types + "other"; new entity types will silently fall through to generic "Entities" label'],
        i18nRecs:['Add new entity types to the ICU select statement as the product expands'],
        tokens:{ score:59, violations:7, css_files:10, token_usages:10, by_cat:{color:0,space:7,radius:0,typography:0},
          top_files:[
            {path:'apps/client/app/components/owner-dashboard/dashboard-nav.css',violations:3},
            {path:'apps/client/app/components/owner-dashboard/tasks/tasks-overview.css',violations:2},
            {path:'apps/client/app/components/owner-dashboard/risks/risks-chart.css',violations:1},
            {path:'apps/client/app/components/owner-dashboard/overview-panel/doughnut-chart.css',violations:1}
          ]
        }
      },
    ];

    // ---- Helpers ----
    function scoreColor(score) {
      if (score >= 80) return 'var(--color-success)';
      if (score >= 65) return 'var(--color-warning-text)';
      return 'var(--color-danger)';
    }
    function scoreBadgeClass(score) {
      if (score >= 80) return 'badge--success';
      if (score >= 65) return 'badge--warning';
      return 'badge--danger';
    }
    function letterGrade(score) {
      if (score >= 93) return 'A';
      if (score >= 90) return 'A\u2212';
      if (score >= 87) return 'B+';
      if (score >= 83) return 'B';
      if (score >= 80) return 'B\u2212';
      if (score >= 77) return 'C+';
      if (score >= 73) return 'C';
      if (score >= 70) return 'C\u2212';
      if (score >= 67) return 'D+';
      if (score >= 63) return 'D';
      if (score >= 60) return 'D\u2212';
      return 'F';
    }
    function scoreBtn(score, facet, name) {
      if (score === null) return '<button class="score-btn null-score" disabled>N/A</button>';
      const band = scoreBadgeClass(score).replace('badge--','');
      const g = letterGrade(score);
      return '<button class="score-btn ' + band + '" onclick="openDrawer(\'' + name + '\',\'' + facet + '\')" aria-label="Open ' + name + ' ' + facet + ' details">' + score + ' <span style="opacity:0.65;font-weight:400;">(' + g + ')</span></button>';
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ---- Derived averages ----
    const count = MODULES.length;
    const avgA11y = Math.round(MODULES.reduce((s, m) => s + m.a11y, 0) / count);
    const avgI18n = Math.round(MODULES.reduce((s, m) => s + m.i18n, 0) / count);
    const tokenModules = MODULES.filter(m => m.tokens !== null);
    const avgTokens = Math.round(tokenModules.reduce((s, m) => s + m.tokens.score, 0) / tokenModules.length);

    // ---- Render table ----
    const tbody = document.getElementById('table-body');

    const avgRow = '<tr class="avg-row">' +
      '<td><div class="avg-row__label">Average</div></td>' +
      '<td><div class="avg-score"><div class="avg-score__value" style="color:' + scoreColor(avgA11y) + '">' + avgA11y + '</div>' +
        '<span class="score-btn ' + scoreBadgeClass(avgA11y).replace('badge--','') + '" style="cursor:default;">' + letterGrade(avgA11y) + ' <span style="opacity:0.65;font-weight:400;">across ' + count + ' modules</span></span></div></td>' +
      '<td><div class="avg-score"><div class="avg-score__value" style="color:' + scoreColor(avgI18n) + '">' + avgI18n + '</div>' +
        '<span class="score-btn ' + scoreBadgeClass(avgI18n).replace('badge--','') + '" style="cursor:default;">' + letterGrade(avgI18n) + ' <span style="opacity:0.65;font-weight:400;">across ' + count + ' modules</span></span></div></td>' +
      '<td><div class="avg-score"><div class="avg-score__value" style="color:' + scoreColor(avgTokens) + '">' + avgTokens + '</div>' +
        '<span class="score-btn ' + scoreBadgeClass(avgTokens).replace('badge--','') + '" style="cursor:default;">' + letterGrade(avgTokens) + ' <span style="opacity:0.65;font-weight:400;">across ' + tokenModules.length + ' modules</span></span></div></td>' +
      '</tr>';

    let moduleRowsHtml = '';
    MODULES.forEach(function(m) {
      const tokCell = m.tokens !== null
        ? '<td>' + scoreBtn(m.tokens.score, 'tokens', m.name) + '</td>'
        : '<td>' + scoreBtn(null, 'tokens', m.name) + '</td>';
      moduleRowsHtml += '<tr class="data-row">' +
        '<td><span class="module-name">' + escHtml(m.name) + '</span></td>' +
        '<td>' + scoreBtn(m.a11y, 'a11y', m.name) + '</td>' +
        '<td>' + scoreBtn(m.i18n, 'i18n', m.name) + '</td>' +
        tokCell +
        '</tr>';
    });

    tbody.innerHTML = avgRow + moduleRowsHtml;

    // ---- Drawer ----
    function scoreSummaryHTML(score, unit) {
      const band = scoreBadgeClass(score).replace('badge--','');
      const g = letterGrade(score);
      const colorVar = band === 'success' ? 'var(--color-success)' : band === 'warning' ? 'var(--color-warning-text)' : 'var(--color-danger)';
      return '<div style="display:flex;align-items:center;gap:var(--space-l);margin-bottom:var(--space-m);">' +
        '<div style="text-align:center;">' +
          '<div style="font-size:2.6rem;font-weight:600;color:' + colorVar + ';line-height:1;">' + score + (unit || '') + '</div>' +
          '<div style="font-size:var(--text-xs);color:var(--color-subdued);margin-top:4px;">out of 100</div>' +
        '</div>' +
        '<div>' +
          '<span class="score-btn ' + band + '" style="cursor:default;font-size:var(--text-s);padding:var(--space-xs) var(--space-m);">' + g + '</span>' +
          '<div style="font-size:var(--text-xs);color:var(--color-subdued);margin-top:var(--space-xs);">Letter grade</div>' +
        '</div>' +
      '</div>';
    }

    function buildA11yContent(m) {
      const risks = m.a11yRisks.map(function(r) { return '<li>' + escHtml(r) + '</li>'; }).join('');
      const recs  = m.a11yRecs.map(function(r) { return '<li>' + escHtml(r) + '</li>'; }).join('');
      return '<div class="drawer-section">' +
          '<div class="drawer-section-title">Score Summary</div>' +
          scoreSummaryHTML(m.a11y, '') +
        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">Accessibility Findings</div>' +
          '<div class="drawer-grid">' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-danger);">Risks</div>' +
              '<ul class="risk-list" style="color:var(--color-danger);">' + risks + '</ul>' +
            '</div>' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-success);">Recommendations</div>' +
              '<ul class="risk-list" style="color:var(--color-success);">' + recs + '</ul>' +
            '</div>' +
          '</div>' +
        '</div>';
    }

    function buildI18nContent(m) {
      const risks = m.i18nRisks.map(function(r) { return '<li>' + escHtml(r) + '</li>'; }).join('');
      const recs  = m.i18nRecs.map(function(r) { return '<li>' + escHtml(r) + '</li>'; }).join('');
      return '<div class="drawer-section">' +
          '<div class="drawer-section-title">Score Summary</div>' +
          scoreSummaryHTML(m.i18n, '') +
        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">Internationalization Findings</div>' +
          '<div class="drawer-grid">' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-danger);">Risks</div>' +
              '<ul class="risk-list" style="color:var(--color-danger);">' + risks + '</ul>' +
            '</div>' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-success);">Recommendations</div>' +
              '<ul class="risk-list" style="color:var(--color-success);">' + recs + '</ul>' +
            '</div>' +
          '</div>' +
        '</div>';
    }

    function buildTokensContent(m) {
      if (m.tokens === null) {
        return '<div class="drawer-section">' +
          '<div class="callout callout--info">' +
            '<div class="callout__title">Not Scored</div>' +
            '<div class="callout__body">The <strong>' + escHtml(m.name) + '</strong> module does not have a Luna Token Adoption score. This is expected for modules without directly owned CSS files (workspace and site-configuration delegate styling to sub-modules or shared libraries).</div>' +
          '</div>' +
        '</div>';
      }
      const t = m.tokens;
      const band = scoreBadgeClass(t.score).replace('badge--','');
      const g = letterGrade(t.score);
      const colorVar = band === 'success' ? 'var(--color-success)' : band === 'warning' ? 'var(--color-warning-text)' : 'var(--color-danger)';
      let fileRows = '';
      if (t.top_files.length > 0) {
        t.top_files.forEach(function(f) {
          fileRows += '<li class="token-file-item">' +
            '<span class="token-file-path" title="' + escHtml(f.path) + '">' + escHtml(f.path.replace('apps/client/app/components/','')) + '</span>' +
            '<span class="token-file-stats">' +
              '<span class="badge badge--danger">' + f.violations + ' viol.</span>' +
            '</span>' +
          '</li>';
        });
      } else {
        fileRows = '<li style="font-size:var(--text-xs);color:var(--color-subdued);padding:var(--space-s) 0;">No CSS files with violations found.</li>';
      }
      return '<div class="drawer-section">' +
          '<div class="drawer-section-title">Score Summary</div>' +
          '<div style="display:flex;align-items:center;gap:var(--space-l);margin-bottom:var(--space-m);">' +
            '<div style="text-align:center;">' +
              '<div style="font-size:2.6rem;font-weight:600;color:' + colorVar + ';line-height:1;">' + t.score + '%</div>' +
              '<div style="font-size:var(--text-xs);color:var(--color-subdued);margin-top:4px;">token adoption</div>' +
            '</div>' +
            '<div>' +
              '<span class="score-btn ' + band + '" style="cursor:default;font-size:var(--text-s);padding:var(--space-xs) var(--space-m);">' + g + '</span>' +
              '<div style="font-size:var(--text-xs);color:var(--color-subdued);margin-top:var(--space-xs);">Letter grade</div>' +
            '</div>' +
            '<div style="text-align:center;">' +
              '<div style="font-size:var(--text-l);font-weight:600;color:var(--color-danger);line-height:1;">' + t.violations + '</div>' +
              '<div style="font-size:var(--text-xs);color:var(--color-subdued);margin-top:4px;">violations</div>' +
            '</div>' +
            '<div style="text-align:center;">' +
              '<div style="font-size:var(--text-l);font-weight:600;color:var(--color-ink);line-height:1;">' + t.css_files + '</div>' +
              '<div style="font-size:var(--text-xs);color:var(--color-subdued);margin-top:4px;">CSS files</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">Top Files with Violations</div>' +
          '<ul class="token-file-list">' + fileRows + '</ul>' +
        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">What This Measures</div>' +
          '<p style="font-size:var(--text-xs);color:var(--color-paragraph);line-height:var(--line-height-s);">Score = var(--luna-*) usages / (usages + violations). A violation is a hardcoded CSS value that matches a known Luna design token value. Higher scores mean more consistent use of the Luna token system.</p>' +
        '</div>';
    }

    function openDrawer(moduleName, facet) {
      const m = MODULES.find(function(x) { return x.name === moduleName; });
      if (!m) return;
      document.getElementById('drawer-title').textContent = m.name;
      document.getElementById('drawer-subtitle').textContent =
        facet === 'a11y' ? 'Accessibility Score' : facet === 'i18n' ? 'Internationalization Score' : 'Luna Token Adoption';
      const body = document.getElementById('drawer-body');
      if (facet === 'a11y')        body.innerHTML = buildA11yContent(m);
      else if (facet === 'i18n')   body.innerHTML = buildI18nContent(m);
      else if (facet === 'tokens') body.innerHTML = buildTokensContent(m);
      document.getElementById('drawer-overlay').classList.add('open');
      const drawer = document.getElementById('drawer');
      drawer.classList.add('open');
      drawer.focus();
    }

    function closeDrawer() {
      document.getElementById('drawer-overlay').classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDrawer(); });
  </script>

</body>
</html>
