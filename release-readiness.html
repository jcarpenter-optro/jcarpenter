<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Release Readiness: AuditBoard Frontend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Figtree:wght@300;400;500;600&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Vibe-inspired design tokens */
      /* Colors */
      --color-primary: #0073ea;
      --color-primary-bg: #dce9ff;
      --color-accent: #595ad4;
      --color-accent-secondary: #00cff4;
      --color-success: #00854d;
      --color-success-bg: #d6f3e6;
      --color-warning: #ffcb00;
      --color-warning-text: #7a5e00;
      --color-warning-bg: #fff8d0;
      --color-danger: #d83a52;
      --color-danger-bg: #fce5ea;
      /* Neutrals */
      --color-ink: #323338;
      --color-paragraph: #323338;
      --color-subdued: #676879;
      --color-light-shade: #c3c6d4;
      --color-lightest-shade: #f6f7fb;
      --color-empty-shade: #ffffff;
      /* Typography */
      --font-heading: 'Poppins', Roboto, sans-serif;
      --font-body: 'Figtree', Roboto, sans-serif;
      --font-mono: 'Roboto Mono', Menlo, Courier, monospace;
      --font-weight-light: 300;
      --font-weight-regular: 400;
      --font-weight-medium: 500;
      --font-weight-semibold: 600;
      --font-weight-bold: 700;
      /* Font scale */
      --text-xs: 0.75rem;
      --text-s:  0.875rem;
      --text-m:  1rem;
      --text-l:  1.125rem;
      --text-xl: 1.5rem;
      --text-xxl: 2rem;
      --line-height-xs: 1rem;
      --line-height-s:  1.375rem;
      --line-height-m:  1.5rem;
      /* Spacing */
      --space-xxs: 2px;
      --space-xs:  4px;
      --space-s:   8px;
      --space-m:   12px;
      --space-base: 16px;
      --space-l:   24px;
      --space-xl:  32px;
      --space-xxl: 40px;
      --space-xxxl: 48px;
      /* Borders */
      --border-thin: 1px solid #c3c6d4;
      --border-thick: 2px solid #c3c6d4;
      --border-radius: 8px;
      --border-radius-s: 4px;
      /* Shadows */
      --shadow-s: 0px 4px 8px rgba(0,0,0,0.12);
      --page-max-width: 1100px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); font-size: var(--text-s); font-weight: var(--font-weight-regular); line-height: var(--line-height-s); color: var(--color-paragraph); background: var(--color-lightest-shade); -webkit-font-smoothing: antialiased; }
    h1, h2, h3, h4, h5, h6 { font-family: var(--font-heading); }
    h4 { font-size: var(--text-m); font-weight: var(--font-weight-semibold); color: var(--color-ink); letter-spacing: -0.1px; }
    a { color: var(--color-primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page-header { background: var(--color-empty-shade); border-bottom: var(--border-thin); padding: var(--space-l) 0; border-top: 3px solid var(--color-primary); }
    .page-header-inner { max-width: var(--page-max-width); margin: 0 auto; padding: 0 var(--space-l); }
    .breadcrumb { font-size: var(--text-xs); color: var(--color-subdued); margin-bottom: var(--space-xs); }
    .breadcrumb a { color: var(--color-primary); }
    .page-header h1 { font-size: var(--text-l); font-weight: var(--font-weight-semibold); color: var(--color-ink); letter-spacing: -0.1px; font-family: var(--font-heading); }
    .page-header p { font-size: var(--text-xs); color: var(--color-subdued); margin-top: var(--space-xs); }

    .page-body { max-width: var(--page-max-width); margin: 0 auto; padding: var(--space-l); }

    .badge { display: inline-flex; align-items: center; font-size: var(--text-xs); font-weight: var(--font-weight-semibold); padding: 2px var(--space-s); border-radius: var(--border-radius-s); line-height: 1.5; white-space: nowrap; }
    .badge--default { background: var(--color-lightest-shade); color: var(--color-subdued); border: var(--border-thin); }
    .badge--success { background: var(--color-success-bg); color: var(--color-success); }
    .badge--warning { background: var(--color-warning-bg); color: var(--color-warning-text); }
    .badge--danger  { background: var(--color-danger-bg);  color: var(--color-danger); }
    .badge--na      { background: var(--color-lightest-shade); color: var(--color-subdued); border: var(--border-thin); font-style: italic; }

    .panel { background: var(--color-empty-shade); border: var(--border-thin); border-radius: var(--border-radius); overflow: hidden; }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: var(--space-m) var(--space-l); border-bottom: var(--border-thin); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: var(--text-s); }
    thead th { font-size: calc(var(--text-xs) * 1.05); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-subdued); text-align: left; padding: var(--space-xl) var(--space-m); border-bottom: var(--border-thick); white-space: normal; }
    thead th .th-inner { display: flex; align-items: flex-start; gap: var(--space-xs); flex-wrap: nowrap; }
    thead th .th-icon { padding-top: 0.15em; }
    thead th .th-icon { flex-shrink: 0; opacity: 0.7; }
    thead th .th-icon svg { width: 0.91em; height: 0.91em; }
    thead th.th-clickable { cursor: pointer; transition: background 0.1s, color 0.1s; }
    thead th.th-clickable:hover { background: var(--color-primary-bg); color: var(--color-primary); }
    thead th.th-clickable:hover .th-icon { opacity: 1; }
    tbody td { padding: var(--space-m); border-bottom: var(--border-thin); vertical-align: middle; color: var(--color-paragraph); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr.data-row:hover { background: var(--color-lightest-shade); }

    /* Score buttons */
    .score-btn { display: inline-flex; align-items: center; gap: 4px; font-size: var(--text-xs); font-weight: var(--font-weight-semibold); padding: 3px var(--space-s); border-radius: var(--border-radius-s); line-height: 1.5; border: none; cursor: pointer; font-family: var(--font-body); transition: opacity 0.12s, box-shadow 0.12s; }
    .score-btn:hover { opacity: 0.82; box-shadow: 0 1px 2px hsla(217,30%,24%,.08), 0 2px 4px hsla(217,30%,24%,.06); }
    .score-btn.success { background: var(--color-success-bg); color: var(--color-success); }
    .score-btn.warning { background: var(--color-warning-bg); color: var(--color-warning-text); }
    .score-btn.danger  { background: var(--color-danger-bg);  color: var(--color-danger); }
    .score-btn.null-score { background: var(--color-lightest-shade); color: var(--color-subdued); border: var(--border-thin); cursor: default; }
    .score-btn.null-score:hover { opacity: 1; box-shadow: none; }

    /* Average row */
    tr.avg-row td { background: var(--color-lightest-shade); border-bottom: var(--border-thick); padding: var(--space-xl) var(--space-m); }
    .avg-row__label { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-subdued); }
    .avg-score { display: flex; flex-direction: column; align-items: flex-start; gap: var(--space-xs); }
    .avg-score__value { font-size: calc(var(--text-xxl) * 0.7); font-weight: var(--font-weight-semibold); font-variant-numeric: tabular-nums; line-height: 1; }
    thead th:first-child, tbody td:first-child { min-width: 170px; white-space: nowrap; }

    .module-name { font-weight: var(--font-weight-semibold); color: var(--color-ink); }
    .module-subtitle { font-size: calc(var(--text-xs) * 0.7); color: var(--color-subdued); font-family: var(--font-mono); font-weight: normal; margin-top: 3px; }
    .module-icon { width: 16px; height: 16px; flex-shrink: 0; display: inline-flex; align-items: center; color: var(--color-primary); }
    .module-name-cell { display: flex; align-items: center; gap: var(--space-s); }

    /* Drawer */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(7,16,31,0.55); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(2px); }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 50%; left: 50%; width: 92%; max-width: 960px; max-height: 88vh; background: var(--color-empty-shade); border: var(--border-thin); border-radius: var(--border-radius); box-shadow: 0px 15px 50px rgba(0,0,0,0.22), 0px 4px 12px rgba(0,0,0,0.10); z-index: 101; transform: translate(-50%, -50%) scale(0.96); opacity: 0; pointer-events: none; transition: transform 0.2s cubic-bezier(.34,1.3,.64,1), opacity 0.15s; overflow-y: auto; display: flex; flex-direction: column; }
    .drawer.open { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
    .drawer-header { position: sticky; top: 0; background: var(--color-empty-shade); border-bottom: var(--border-thin); padding: var(--space-l); display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-m); z-index: 1; border-radius: var(--border-radius) var(--border-radius) 0 0; }
    .drawer-header-title h3 { font-size: var(--text-m); font-weight: var(--font-weight-semibold); color: var(--color-ink); }
    .drawer-header-title .drawer-subtitle { font-size: var(--text-xs); color: var(--color-subdued); margin-top: 2px; }
    .drawer-close { background: none; border: none; cursor: pointer; color: var(--color-subdued); font-size: 20px; padding: var(--space-xs); border-radius: var(--border-radius); line-height: 1; flex-shrink: 0; }
    .drawer-close:hover { background: var(--color-lightest-shade); color: var(--color-ink); }
    .drawer-body { padding: var(--space-l); flex: 1; }
    .drawer-section { margin-bottom: var(--space-xl); }
    .drawer-section:last-child { margin-bottom: 0; }
    .drawer-section-title { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-ink); margin-bottom: var(--space-m); padding-bottom: var(--space-s); border-bottom: var(--border-thin); }
    .drawer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-l); }
    @media (max-width: 640px) { .drawer-grid { grid-template-columns: 1fr; } }
    .drawer-col-label { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-subdued); margin-bottom: var(--space-s); }
    .risk-list { list-style: none; padding: 0; margin: 0; }
    .risk-list li { font-size: var(--text-xs); color: var(--color-paragraph); padding: var(--space-xs) 0 var(--space-xs) var(--space-m); border-bottom: var(--border-thin); position: relative; line-height: var(--line-height-s); }
    .risk-list li:last-child { border-bottom: none; }
    .risk-list li::before { content: ''; position: absolute; left: 4px; top: 10px; width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.4; }
    .token-file-list { list-style: none; padding: 0; margin: 0; }
    .token-file-item { display: flex; align-items: center; justify-content: space-between; padding: var(--space-xs) 0; border-bottom: var(--border-thin); gap: var(--space-m); }
    .token-file-item:last-child { border-bottom: none; }
    .token-file-path { font-family: var(--font-mono); font-size: 0.78rem; color: var(--color-paragraph); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .token-file-stats { display: flex; gap: var(--space-s); flex-shrink: 0; }
    .callout { border-radius: var(--border-radius); padding: var(--space-m) var(--space-l); border-left: 4px solid; margin-bottom: var(--space-m); }
    .callout--info    { background: var(--color-primary-bg); border-color: var(--color-primary); }
    .callout--success { background: var(--color-success-bg); border-color: var(--color-success); }
    .callout--warning { background: var(--color-warning-bg); border-color: var(--color-warning); }
    .callout--danger  { background: var(--color-danger-bg);  border-color: var(--color-danger); }
    .callout__title { font-size: var(--text-s); font-weight: var(--font-weight-semibold); margin-bottom: var(--space-xs); color: var(--color-ink); }
    .callout__body { font-size: var(--text-s); color: var(--color-paragraph); }
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-m); margin-bottom: var(--space-l); }
    .stat-card { background: var(--color-empty-shade); border: var(--border-thin); border-radius: var(--border-radius); padding: var(--space-m) var(--space-l); }
    .stat-card__label { font-size: var(--text-xs); color: var(--color-subdued); margin-bottom: var(--space-xs); text-transform: uppercase; letter-spacing: 0.05em; font-weight: var(--font-weight-semibold); }
    .stat-card__value { font-size: var(--text-xl); font-weight: 700; font-family: var(--font-heading); color: var(--color-ink); font-variant-numeric: tabular-nums; line-height: 1; }
    .stat-card__description { font-size: var(--text-xs); color: var(--color-subdued); margin-top: var(--space-xs); }
    .insights-row { display: flex; flex-direction: column; gap: var(--space-m); margin-bottom: var(--space-l); }
    .code-example { background: var(--color-lightest-shade); border: var(--border-thin); border-radius: var(--border-radius); padding: var(--space-m); font-family: var(--font-mono); font-size: var(--text-xs); }
    .code-before { color: var(--color-danger); }
    .code-after  { color: var(--color-success); }
    .prompt-pre { font-size: var(--text-xs); line-height: 1.65; background: var(--color-lightest-shade); border: var(--border-thin); border-radius: var(--border-radius); padding: var(--space-m) var(--space-l); white-space: pre-wrap; word-break: break-word; color: var(--color-paragraph); font-family: var(--font-body); overflow: hidden; }
    .prompt-pre.prompt-collapsed { max-height: 4.95em; }
    .prompt-toggle { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; color: var(--color-primary); font-size: var(--text-xs); cursor: pointer; padding: var(--space-xs) 0; font-family: var(--font-body); font-weight: var(--font-weight-semibold); margin-top: var(--space-xs); }
    .prompt-toggle:hover { text-decoration: underline; }
    .prompt-copy-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: var(--border-thin); border-radius: var(--border-radius); color: var(--color-primary); font-size: var(--text-xs); font-family: var(--font-body); font-weight: var(--font-weight-semibold); cursor: pointer; padding: 2px var(--space-s); transition: all 0.15s; }
    .prompt-copy-btn:hover { background: var(--color-primary-bg); }
    .prompt-copy-btn.copied { color: var(--color-success); border-color: var(--color-success); background: var(--color-success-bg); }
    .drawer-section-title { display: flex; align-items: center; gap: var(--space-s); }
    .drawer-section-title svg { color: var(--color-primary); flex-shrink: 0; }
    .mi-overlay { position: fixed; inset: 0; background: rgba(7,16,31,0.5); z-index: 200; display: none; align-items: center; justify-content: center; }
    .mi-overlay.open { display: flex; }
    .mi-box { background: var(--color-empty-shade); border-radius: var(--border-radius); box-shadow: var(--shadow-l, 0 8px 32px rgba(0,0,0,0.18)); padding: var(--space-xl); max-width: 540px; width: 90vw; max-height: 80vh; overflow-y: auto; position: relative; }
    .mi-close { position: absolute; top: var(--space-m); right: var(--space-m); background: none; border: none; cursor: pointer; color: var(--color-subdued); font-size: 18px; padding: var(--space-xs); border-radius: var(--border-radius); line-height: 1; }
    .mi-close:hover { background: var(--color-lightest-shade); color: var(--color-ink); }
    .mi-title { font-size: var(--text-l); font-weight: var(--font-weight-semibold); color: var(--color-ink); margin-bottom: var(--space-xs); padding-right: var(--space-xl); }
    .mi-section-label { font-size: var(--text-xs); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-subdued); margin-bottom: var(--space-s); margin-top: var(--space-l); }
    .mi-dir-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: var(--space-xs); }
    .mi-dir-list li code { display: inline-block; font-family: var(--font-mono); font-size: calc(var(--text-xs) * 0.85); background: var(--color-lightest-shade); border: var(--border-thin); border-radius: var(--border-radius-s, 3px); padding: 2px var(--space-s); color: var(--color-paragraph); }
    .mi-stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: var(--space-m); margin-top: var(--space-m); }
    .mi-stat { background: var(--color-lightest-shade); border-radius: var(--border-radius); padding: var(--space-m); }
    .mi-stat__label { font-size: calc(var(--text-xs) * 0.85); color: var(--color-subdued); margin-bottom: var(--space-xs); }
    .mi-stat__value { font-size: var(--text-l); font-weight: 700; color: var(--color-ink); font-variant-numeric: tabular-nums; line-height: 1; }
  </style>
</head>
<body>

  <header class="page-header">
    <div class="page-header-inner">
      <div class="breadcrumb"><a href="index.html">Projects</a> / Release Readiness</div>
      <h1>Release Readiness: AuditBoard Frontend</h1>
      <p>A11y, i18n, Luna token adoption, and Smart Forms governance per module · Click any score for details</p>
      <p class="text-subdued text-xs" style="margin-top:var(--space-xs);">March 27, 2026</p>
    </div>
  </header>

  <main class="page-body">

    <div id="stat-section" class="stat-row"></div>
    <div id="insights-section" class="insights-row"></div>

    <div class="panel">
      <div class="panel-header">
        <h4>Module Scores</h4>
        <span class="badge badge--default">23 modules</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th></th>
              <th class="th-clickable" onclick="openColumnDrawer('a11y')" title="Click to learn how A11y scores are evaluated"><div class="th-inner"><span class="th-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="3" r="1.5" fill="currentColor"/><path d="M4 6.5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 6.5v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M5.5 13.5L8 10.5l2.5 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>A11y</div></th>
              <th class="th-clickable" onclick="openColumnDrawer('i18n')" title="Click to learn how i18n scores are evaluated"><div class="th-inner"><span class="th-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 2.5S6 5 6 8s2 5.5 2 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2.5 8h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3 5.5h10M3 10.5h10" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.5"/></svg></span>i18n</div></th>
              <th class="th-clickable" onclick="openColumnDrawer('tokens')" title="Click to learn how Luna Token scores are evaluated"><div class="th-inner"><span class="th-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13.5 10.5A6 6 0 116 3.5a4 4 0 007.5 7z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Luna<br>Tokens</div></th>
              <th class="th-clickable" onclick="openColumnDrawer('smart-forms')" title="Click to learn how Smart Forms scores are evaluated"><div class="th-inner"><span class="th-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="2" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 5.5h5M5.5 8h5M5.5 10.5h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>Smart<br>Forms</div></th>
              <th class="th-clickable" onclick="openColumnDrawer('general-consistency')" title="Click to learn how General Consistency scores are evaluated"><div class="th-inner"><span class="th-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="1.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/></svg></span>General<br>Consistency</div></th>
              <th class="th-clickable" onclick="openColumnDrawer('luna-consistency')" title="Click to learn how Luna Consistency scores are evaluated"><div class="th-inner"><span class="th-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 2L13.5 7L8 14L2.5 7L8 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M2.5 7H13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>Luna<br>Consistency</div></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

  </main>

  <div id="drawer-overlay" class="drawer-overlay" onclick="closeDrawer()"></div>
  <div id="drawer" class="drawer" role="dialog" aria-modal="true" tabindex="-1">
    <div class="drawer-header" id="drawerHeader"></div>
    <div class="drawer-body" id="drawerBody"></div>
  </div>

    // ---- Helpers ----
    function scoreColor(score) {
      if (score >= 80) return 'var(--color-success)';
      if (score >= 65) return 'var(--color-warning-text)';
      return 'var(--color-danger)';
    }
    function scoreBadgeClass(score) {
      if (score >= 80) return 'badge--success';
      if (score >= 65) return 'badge--warning';
      return 'badge--danger';
    }
    function letterGrade(score) {
      if (score >= 93) return 'A';
      if (score >= 90) return 'A\u2212';
      if (score >= 87) return 'B+';
      if (score >= 83) return 'B';
      if (score >= 80) return 'B\u2212';
      if (score >= 77) return 'C+';
      if (score >= 73) return 'C';
      if (score >= 70) return 'C\u2212';
      if (score >= 67) return 'D+';
      if (score >= 63) return 'D';
      if (score >= 60) return 'D\u2212';
      return 'F';
    }

    function scoreBtn(score, facet, name) {
      if (score === null) return '<button class="score-btn null-score" disabled>N/A</button>';
      const band = scoreBadgeClass(score).replace('badge--','');
      const g = letterGrade(score);
      return '<button class="score-btn ' + band + '" onclick="openDrawer(\'' + name + '\',\'' + facet + '\')" aria-label="Open ' + name + ' ' + facet + ' details">' + score + ' <span style="opacity:0.65;font-weight:400;">(' + g + ')</span></button>';
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ---- Derived averages ----

    const sfModules = MODULES.filter(m => m.smartForms !== null && m.smartForms !== undefined);

    const gcModules = MODULES.filter(m => m.generalConsistency && m.generalConsistency.score !== null && m.generalConsistency.score !== undefined);

    // ---- Prompt helpers ----
    function buildTokenPrompt(m) {
      const t = m.tokens;
      if (t.violations === 0) return m.name + ' already scores 100% on Luna token adoption. No CSS changes are needed.';
      const path = MODULE_PATHS[m.name] || 'apps/client/app/components/' + m.name;
      const L = [];
      L.push('You are helping migrate the ' + m.name + ' module in the auditboard-frontend Ember.js app to use Luna design tokens instead of hardcoded CSS values. Make every replacement listed in the token reference below. Do not stop until every CSS/SCSS file in the module has been scanned and all matching hardcoded values have been replaced.');
      L.push('');
      L.push('REPOSITORY');
      L.push('  Module source:    ' + path + '/');
      L.push('  Score to improve: ' + t.score + '% (Grade ' + letterGrade(t.score) + ')');
      L.push('');
      L.push('SCAN SUMMARY');
      L.push('The scanner found ' + t.violations + ' hardcoded CSS declarations across ' + t.css_files + ' file' + (t.css_files !== 1 ? 's' : '') + ' that should use Luna token variables.');
      L.push('Violations by category:');
      if (t.by_cat.space > 0)      L.push('  Space / size:  ' + t.by_cat.space + '  (margin, padding, gap, width, height using raw px/rem)');
      if (t.by_cat.color > 0)      L.push('  Color:         ' + t.by_cat.color + '  (hardcoded hex values in color/background/border)');
      if (t.by_cat.radius > 0)     L.push('  Border-radius: ' + t.by_cat.radius + '  (raw px values)');
      if (t.by_cat.typography > 0) L.push('  Typography:    ' + t.by_cat.typography + '  (raw rem font-size values)');
      L.push('');
      if (t.top_files && t.top_files.length > 0) {
        L.push('Highest-violation files (start here):');
        t.top_files.forEach(function(f) { L.push('  ' + f.path + '  (' + f.violations + ' violation' + (f.violations !== 1 ? 's' : '') + ')'); });
        L.push('');
      }
      L.push('TOKEN REFERENCE: SPACE / SIZE');
      L.push('Replace hardcoded values in spacing properties (margin, padding, gap, width, height, top, right, bottom, left, min-width, min-height, max-width, max-height) with:');
      L.push('  2px  / 0.125rem  ->  var(--luna-space-xxs)');
      L.push('  4px  / 0.25rem   ->  var(--luna-space-xs)');
      L.push('  8px  / 0.5rem    ->  var(--luna-space-s)');
      L.push('  12px / 0.75rem   ->  var(--luna-space-m)');
      L.push('  16px / 1rem      ->  var(--luna-space-base)');
      L.push('  24px / 1.5rem    ->  var(--luna-space-l)');
      L.push('  32px / 2rem      ->  var(--luna-space-xl)');
      L.push('  40px / 2.5rem    ->  var(--luna-space-xxl)');
      L.push('  48px / 3rem      ->  var(--luna-space-xxxl)');
      L.push('  64px / 4rem      ->  var(--luna-space-xxxxl)');
      L.push('');
      if (t.by_cat.color > 0) {
        L.push('TOKEN REFERENCE: COLOR');
        L.push('Replace hardcoded hex values in color, background-color, background, border-color, fill, and stroke properties with:');
        L.push('  #1A1C21  ->  var(--luna-color-ink)');
        L.push('  #343741  ->  var(--luna-color-paragraph)');
        L.push('  #646A76  ->  var(--luna-color-subdued)');
        L.push('  #E3E8F2  ->  var(--luna-color-light-shade)');
        L.push('  #F5F7FA  ->  var(--luna-color-lightest-shade)');
        L.push('  #FFFFFF  ->  var(--luna-color-empty-shade)');
        L.push('  #0B64DD  ->  var(--luna-color-primary)');
        L.push('  #F1F6FF  ->  var(--luna-color-primary-bg)');
        L.push('  #008A5E  ->  var(--luna-color-success)');
        L.push('  #E6F5F0  ->  var(--luna-color-success-bg)');
        L.push('  #C61E25  ->  var(--luna-color-danger)');
        L.push('  #FDECEA  ->  var(--luna-color-danger-bg)');
        L.push('  #825803  ->  var(--luna-color-warning-text)');
        L.push('  #FACB3D  ->  var(--luna-color-warning)');
        L.push('  #FFF8E1  ->  var(--luna-color-warning-bg)');
        L.push('');
      }
      if (t.by_cat.radius > 0) {
        L.push('TOKEN REFERENCE: BORDER RADIUS');
        L.push('Replace hardcoded values in border-radius (and longhand variants: border-top-left-radius, etc.) with:');
        L.push('  4px   ->  var(--luna-radius-s)');

        L.push('Replace hardcoded values in font-size with:');
        L.push('  0.857rem  ->  var(--luna-font-size-xs)');
        L.push('  1rem      ->  var(--luna-font-size-s)');
        L.push('  1.143rem  ->  var(--luna-font-size-m)');

      L.push('- Only edit .css and .scss files. Do NOT touch .gjs, .gts, .hbs, .ts, or .js files.');
      L.push('- Do NOT replace 0 values. Zero never needs a token.');

      L.push('- Preserve all formatting, indentation, and comments in every file you edit.');
      L.push('');
      L.push('HOW TO PROCEED');
      L.push('');
      L.push('Step 1: Discover all CSS/SCSS files in the module');
      L.push('  Glob: ' + path + '/**/*.{css,scss}');
      L.push('  Read the full list of results before proceeding.');
      L.push('');
      L.push('Step 2: Process the highest-violation files first');
      L.push('  Start with the files listed in "Highest-violation files" above.');
      L.push('  For each file:');
      L.push('    a. Read the full file content');
      L.push('    b. Scan every CSS property declaration for hardcoded values that appear in the token reference');
      L.push('    c. Apply all replacements in a single Edit operation per file');
      L.push('    d. Read the file back and confirm no token-mappable hardcoded values remain');
      L.push('');
      L.push('Step 3: Sweep all remaining CSS/SCSS files');
      L.push('  After the top files, process every remaining .css and .scss file from Step 1.');
      L.push('  Apply the same read-replace-verify loop.');
      L.push('');
      L.push('Step 4: Final verification');
      L.push('  Run: git diff --stat');
      L.push('  Then run these Grep searches to catch any remaining hardcoded values in the module:');
      L.push('    Pattern: #[0-9A-Fa-f]{3,6}  (remaining hex colors)  path: ' + path);
      L.push('    Pattern: [0-9]+(px|rem)  (remaining pixel/rem values)  path: ' + path + '  file types: .css .scss');
      L.push('');
      L.push('Step 5: Report back');
      L.push('  1. Every file modified (list each path)');
      L.push('  2. Total number of replacements made');
      L.push('  3. Any hardcoded values that were NOT in the token reference and were left unchanged: list the value, the CSS property, and the file it appears in');
      return L.join('\n');
    }

      L.push('REQUIRED CHANGES (implement each one completely)');

      L.push('HOW TO PROCEED');

      L.push('Step 1: Read the current translation file');

      L.push('  For every item in REQUIRED CHANGES:');

      L.push('    d. If the component class does not have @service declare intl injected, add it');
      L.push('    e. Add the new key + English value to apps/client/app/locales/en-US.json');
      L.push('      : do not duplicate a key that already exists with the same English value');
      L.push('    f. Confirm the hardcoded string is gone with Grep');
      L.push('');
      L.push('Step 4: Run the translation extractor');
      L.push('  Run: pnpm --filter @auditboard/client generate:en-US');
      L.push('  If successful, re-read apps/client/app/locales/en-US.json to confirm your new keys are present.');
      L.push('  If the command fails, note the error but do not block on it: the manually added keys are still valid.');
      L.push('');
      L.push('Step 5: Final sweep verification');
      L.push('  Grep the module source for remaining hardcoded user-visible strings:');
      L.push('    Pattern: >"[A-Z]  in .gts/.gjs/.hbs  (JSX/template text node starting uppercase)');
      L.push('    Pattern: = "[A-Z][a-z]  in .ts/.js  (JS string starting with capital word: may be user-visible)');

    }

    function copyPromptBtn(btn) {
      const svgCopy = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';

      const succeed = function() {
        btn.classList.add('copied'); btn.innerHTML = svgCheck + ' Copied!';
        setTimeout(function() { btn.classList.remove('copied'); btn.innerHTML = svgCopy + ' Copy'; }, 2200);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(_currentPrompt).then(succeed).catch(function() {
          const ta = document.createElement('textarea'); ta.value = _currentPrompt;
          ta.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(ta);
          ta.select(); document.execCommand('copy'); document.body.removeChild(ta); succeed();
        });
      } else {
        const ta = document.createElement('textarea'); ta.value = _currentPrompt;
        ta.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta); succeed();
      }
    }

    function buildTokensContent(m) {
      if (m.tokens === null) {
        _currentPrompt = '';
        return '<div class="callout callout--info">' +
          '<div class="callout__title">Not Scored</div>' +
          '<div class="callout__body">The <strong>' + escHtml(m.name) + '</strong> module does not have a Luna Token Adoption score. Workspace and site-configuration delegate CSS to sub-modules and shared libraries.</div>' +
        '</div>';
      }
      const t = m.tokens;
      const total = t.token_usages + t.violations;
      const scoreExplain = total === 0
        ? 'This module has no CSS files with scannable properties.'
        : t.violations.toLocaleString() + ' out of ' + total.toLocaleString() + ' relevant CSS declarations use hardcoded values instead of Luna design tokens. Replacing these would raise the score to 100%.';
      const catParts = [];
      if (t.by_cat.space > 0)      catParts.push(t.by_cat.space + ' space/size');
      if (t.by_cat.color > 0)      catParts.push(t.by_cat.color + ' color');
      if (t.by_cat.radius > 0)     catParts.push(t.by_cat.radius + ' radius');
      if (t.by_cat.typography > 0) catParts.push(t.by_cat.typography + ' typography');
      const catBreakdown = catParts.length > 0 ? ' Violations by category: ' + catParts.join(', ') + '.' : '';
      const calloutType = t.score >= 80 ? 'success' : t.score >= 50 ? 'warning' : 'danger';

      let html = '<div class="callout callout--' + calloutType + '" style="margin-bottom:var(--space-l);">' +
        '<div class="callout__title">Score: ' + t.score + '% (Grade ' + letterGrade(t.score) + ')</div>' +
        '<div class="callout__body">' + scoreExplain + catBreakdown + '</div>' +
      '</div>';

      // How to improve
      const tips = [];
      if (t.by_cat.space > 0) tips.push({
        title: 'Replace hardcoded spacing values',
        body: 'Margin, padding, gap, and size properties are using raw pixel or rem values. Swapping them for Luna space tokens is typically the highest-impact change and improves consistency across the app.',
        before: 'margin: 16px;\npadding: 8px 24px;\ngap: 12px;',
        after: 'margin: var(--luna-space-base);\npadding: var(--luna-space-s) var(--luna-space-l);\ngap: var(--luna-space-m);',
        color: 'var(--color-warning)',
      });
      if (t.by_cat.color > 0) tips.push({
        title: 'Replace hardcoded hex colors',
        body: 'Color, background, and border properties use hex values that map to Luna color tokens.',
        before: 'color: #343741;\nbackground-color: #F5F7FA;\nborder-color: #E3E8F2;',
        after: 'color: var(--luna-color-paragraph);\nbackground-color: var(--luna-color-lightest-shade);\nborder-color: var(--luna-color-light-shade);',
        color: 'var(--color-danger)',
      });
      if (t.by_cat.radius > 0) tips.push({
        title: 'Replace hardcoded border-radius values',
        body: 'Border-radius properties use raw pixel values that map to Luna radius tokens.',
        before: 'border-radius: 4px;\nborder-radius: 8px;',
        after: 'border-radius: var(--luna-radius-s);\nborder-radius: var(--luna-radius-m);',
        color: 'var(--color-primary)',
      });

      if (tips.length > 0) {
        const svgBulb = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14z"/></svg>';
        html += '<div class="drawer-section"><div class="drawer-section-title">' + svgBulb + 'How to Improve</div>';
        tips.forEach(function(tip) {
          html += '<div style="margin-bottom:var(--space-l);padding:var(--space-m);border:var(--border-thin);border-left:3px solid ' + tip.color + ';border-radius:var(--border-radius);">';
          html += '<div style="font-weight:var(--font-weight-semibold);font-size:var(--text-s);margin-bottom:var(--space-xs);">' + tip.title + '</div>';
          html += '<p class="text-xs text-subdued" style="margin-bottom:var(--space-s);">' + tip.body + '</p>';
          html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-s);">';
          html += '<div><div class="text-xs" style="color:var(--color-danger);font-weight:600;margin-bottom:2px;">Before</div>';
          html += '<div class="code-example"><span class="code-before">' + tip.before.replace(/\n/g,'<br>') + '</span></div></div>';
          html += '<div><div class="text-xs" style="color:var(--color-success);font-weight:600;margin-bottom:2px;">After</div>';
          html += '<div class="code-example"><span class="code-after">' + tip.after.replace(/\n/g,'<br>') + '</span></div></div>';
          html += '</div></div>';
        });
        html += '</div>';
      }

      // Quick wins
      if (t.top_files && t.top_files.length > 0) {
        const quickWins = t.top_files.filter(function(f) { return f.violations >= 1 && f.violations <= 3; });
        if (quickWins.length > 0) {
          const svgZap = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>';

          html += '<div class="callout__body">These files each have 3 or fewer violations. Fixing them is fast and raises your score immediately.<br><br>';

            const parts = f.path.split('/');
            const short = parts.slice(-2).join('/');
            html += '<span class="text-mono" style="display:inline-block;margin-right:var(--space-m);margin-bottom:var(--space-xs);">' + escHtml(short) + '</span>';
            html += '<span class="badge badge--warning" style="margin-right:var(--space-l);">' + f.violations + ' violation' + (f.violations !== 1 ? 's' : '') + '</span><br>';
          });
          html += '</div></div>';
        }
      }

      _currentPrompt = buildTokenPrompt(m);
      html += promptSection();

      // Top offending files
      if (t.top_files && t.top_files.length > 0) {
        const svgFile = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
        html += '<div class="drawer-section"><div class="drawer-section-title">' + svgFile + 'Top Offending Files</div>';
        html += '<table style="font-size:var(--text-xs);width:100%;"><thead><tr>';
        html += '<th style="text-align:left;padding:var(--space-xs) var(--space-s);border-bottom:var(--border-thick);color:var(--color-subdued);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">File</th>';
        html += '<th style="text-align:right;padding:var(--space-xs) var(--space-s);border-bottom:var(--border-thick);color:var(--color-subdued);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">Violations</th>';
        html += '</tr></thead><tbody>';
        t.top_files.forEach(function(f) {
          const parts = f.path.split('/');
          const short = parts.slice(-2).join('/');
          html += '<tr><td style="padding:var(--space-xs) var(--space-s);border-bottom:var(--border-thin);font-family:var(--font-mono);word-break:break-all;" title="' + escHtml(f.path) + '">' + escHtml(short) + '</td>';
          html += '<td style="text-align:right;padding:var(--space-xs) var(--space-s);border-bottom:var(--border-thin);color:var(--color-danger);font-weight:600;">' + f.violations + '</td></tr>';
        });
        html += '</tbody></table></div>';
      }

      return html;
    }

      }
    };

    function openColumnDrawer(facet) {
      var def = COLUMN_DEFS[facet];
      if (!def) return;

      var bandRows = def.bands.map(function(b) {
        return '<li style="display:flex;gap:var(--space-m);align-items:flex-start;padding:var(--space-s) 0;border-bottom:var(--border-thin);">' +
          '<span style="font-size:var(--text-xs);font-weight:var(--font-weight-semibold);background:var(--color-lightest-shade);border:var(--border-thin);border-radius:var(--border-radius);padding:2px 10px;flex-shrink:0;white-space:nowrap;">' + b.label + '&nbsp;&nbsp;' + b.range + '</span>' +
          '<span style="font-size:var(--text-xs);color:var(--color-paragraph);line-height:var(--line-height-s);">' + b.desc + '</span>' +
          '</li>';
      }).join('');

      var signalItems = def.signals.map(function(s) { return '<li>' + s + '</li>'; }).join('');

      var body =
        '<div class="drawer-section">' +
          '<div class="callout callout--info">' +
            '<div class="callout__title">How scores are calculated</div>' +
            '<div class="callout__body">' + def.about + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">What gets evaluated</div>' +
          '<ul class="risk-list">' + signalItems + '</ul>' +
        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">Scoring bands</div>' +
          '<ul style="list-style:none;padding:0;margin:0;">' + bandRows + '</ul>' +
        '</div>' +
        '</div>';

      var ghSvg = '<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor" style="flex-shrink:0;" xmlns="http://www.w3.org/2000/svg"><path d="M8 1.5C4.41 1.5 1.5 4.41 1.5 8c0 2.88 1.87 5.32 4.47 6.18.33.06.45-.14.45-.31v-1.09c-1.82.4-2.2-.88-2.2-.88-.3-.75-.72-.95-.72-.95-.59-.4.04-.4.04-.4.65.05 1 .67 1 .67.58 1 1.52.71 1.89.54.06-.42.23-.71.41-.87-1.45-.17-2.98-.73-2.98-3.24 0-.71.25-1.3.67-1.76-.07-.16-.29-.83.06-1.73 0 0 .55-.18 1.79.67A6.2 6.2 0 018 5.07c.55 0 1.1.07 1.62.22 1.24-.85 1.79-.67 1.79-.67.35.9.13 1.57.06 1.73.42.46.67 1.05.67 1.76 0 2.52-1.53 3.07-2.99 3.23.24.2.44.6.44 1.21v1.79c0 .17.12.37.45.31A6.51 6.51 0 0014.5 8c0-3.59-2.91-6.5-6.5-6.5z"/></svg>';

      document.getElementById('drawerHeader').innerHTML =
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:var(--text-xs);color:var(--color-subdued);margin-bottom:var(--space-xs);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;">Evaluation Method</div>' +
          '<div style="font-size:var(--text-l);font-weight:var(--font-weight-semibold);color:var(--color-ink);margin-bottom:var(--space-s);">' + def.title + '</div>' +
          '<div style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-s);flex-wrap:wrap;">' +
            '<span class="badge badge--default">' + def.badge + '</span>' +
            '<a href="' + def.skillUrl + '" target="_blank" rel="noopener" style="text-decoration:none;display:inline-flex;align-items:center;gap:var(--space-xs);font-size:var(--text-xs);font-weight:var(--font-weight-semibold);color:var(--color-empty-shade);background:var(--color-primary);border:none;border-radius:var(--border-radius);padding:5px var(--space-m);transition:opacity 0.1s;" onmouseover="this.style.opacity=\'0.85\'" onmouseout="this.style.opacity=\'1\'">' + ghSvg + 'View skill on GitHub</a>' +
          '</div>' +
          '<div style="font-size:var(--text-xs);color:var(--color-subdued);margin-top:var(--space-xs);">Data collected: ' + def.collectedAt + '</div>' +
        '</div>' +
        '<button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>';

      document.getElementById('drawerBody').innerHTML = body;
      document.getElementById('drawer-overlay').classList.add('open');
      var drawer = document.getElementById('drawer');
      drawer.classList.add('open');
      drawer.focus();
      document.body.style.overflow = 'hidden';
    }

    function openDrawer(moduleName, facet) {
      const m = MODULES.find(function(x) { return x.name === moduleName; });
      if (!m) return;

      const scoreVal = facet === 'a11y' ? m.a11y
        : facet === 'i18n' ? m.i18n
        : facet === 'tokens' ? (m.tokens ? m.tokens.score : null)
        : facet === 'smart-forms' ? (m.smartForms ? m.smartForms.score : null)
        : facet === 'general-consistency' ? (m.generalConsistency ? m.generalConsistency.score : null)
        : (m.lunaConsistency ? m.lunaConsistency.score : null);
      const badgeClass = scoreVal !== null ? scoreBadgeClass(scoreVal) : 'badge--default';
      const facetLabel = facet === 'a11y' ? 'Accessibility'
        : facet === 'i18n' ? 'Internationalization'
        : facet === 'tokens' ? 'Luna Token Adoption'
        : facet === 'smart-forms' ? 'Smart Forms'
        : facet === 'general-consistency' ? 'General Consistency'
        : 'Luna Consistency';
      const scoreDisplay = scoreVal !== null ? (facet === 'tokens' ? scoreVal + '%' : scoreVal + '') : 'N/A';
      const gradeDisplay = scoreVal !== null ? letterGrade(scoreVal) : '';

      document.getElementById('drawerHeader').innerHTML =
        '<div>' +
          '<div style="font-size:var(--text-l);font-weight:var(--font-weight-semibold);color:var(--color-ink);margin-bottom:var(--space-xs);">' + escHtml(m.display) + '</div>' +
          (m.name.indexOf('(') !== -1 ? '<div style="font-size:calc(var(--text-xs) * 0.7);color:var(--color-subdued);font-family:var(--font-mono);margin-bottom:var(--space-s);">' + escHtml(m.name.slice(m.name.indexOf('(')+1, -1)) + '</div>' : '<div style="margin-bottom:var(--space-s);"></div>') +
          '<div style="display:flex;gap:var(--space-s);flex-wrap:wrap;">' +
            (scoreVal !== null ? '<span class="badge ' + badgeClass + '">' + scoreDisplay + '</span>' : '') +
            (gradeDisplay ? '<span class="badge ' + badgeClass + '">Grade ' + gradeDisplay + '</span>' : '') +
            (scoreVal === null && facet === 'smart-forms' && m.smartForms ? '<span class="badge badge--default">Exempt</span>' : '') +
            '<span class="badge badge--default">' + facetLabel + '</span>' +
          '</div>' +
        '</div>' +
        '<button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>';

      const body = document.getElementById('drawerBody');
      if (facet === 'a11y')                     body.innerHTML = buildA11yContent(m);
      else if (facet === 'i18n')                body.innerHTML = buildI18nContent(m);
      else if (facet === 'tokens')              body.innerHTML = buildTokensContent(m);
      else if (facet === 'smart-forms')         body.innerHTML = buildSmartFormsContent(m);
      else if (facet === 'general-consistency') body.innerHTML = buildGeneralConsistencyContent(m);
      else if (facet === 'luna-consistency')    body.innerHTML = buildLunaConsistencyContent(m);

      document.getElementById('drawer-overlay').classList.add('open');
      const drawer = document.getElementById('drawer');
      drawer.classList.add('open');
      drawer.focus();
      document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
      document.getElementById('drawer-overlay').classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeDrawer(); closeMI(); } });

    function openMI(name) {
      var m = MODULES.find(function(x) { return x.name === name; });
      if (!m) return;
      var dispName = m.display || m.name.split(' (')[0];
      var subtitle = m.name.indexOf('(') !== -1 ? m.name.slice(m.name.indexOf('(')+1, -1) : '';
      var dirs = subtitle ? subtitle.split(', ') : [];
      var dirsHtml = dirs.length
        ? '<ul class="mi-dir-list">' + dirs.map(function(d) { return '<li><code>' + d + '</code></li>'; }).join('') + '</ul>'
        : '';
      var filesRows = [];
      if (m.tokens) {
        filesRows.push('<strong>' + m.tokens.css_files + '</strong> CSS / SCSS file' + (m.tokens.css_files !== 1 ? 's' : '') + ' — scanned for Luna token adoption');
      }
      filesRows.push('Template files (.gjs, .gts, .hbs) — evaluated for accessibility, i18n, Smart Forms, and code consistency');
      var filesHtml = '<ul style="margin:var(--space-s) 0 0;padding-left:var(--space-l);font-size:var(--text-s);color:var(--color-ink);line-height:1.6;">' +
        filesRows.map(function(r) { return '<li>' + r + '</li>'; }).join('') + '</ul>';
      var sampleHtml = '';
      if (m.tokens && m.tokens.top_files && m.tokens.top_files.length) {
        sampleHtml = '<div class="mi-section-label" style="margin-top:var(--space-l);">Sample CSS File Locations</div>' +
          '<ul class="mi-dir-list">' +
          m.tokens.top_files.slice(0,8).map(function(f) { return '<li><code>' + f.path + '</code></li>'; }).join('') +
          '</ul>';
      }
      var iconHtml = MODULE_ICONS[dispName] ? '<span style="width:20px;height:20px;display:inline-flex;flex-shrink:0;color:var(--color-primary);">' + MODULE_ICONS[dispName] + '</span>' : '';
      document.getElementById('miContent').innerHTML =
        '<div class="mi-title" style="display:flex;align-items:center;gap:var(--space-s);">' + iconHtml + dispName + '</div>' +
        '<div class="mi-section-label">Code Components</div>' + dirsHtml +
        '<div class="mi-section-label">Files Scanned</div>' + filesHtml +
        sampleHtml;
      document.getElementById('miOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeMI() {
      document.getElementById('miOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    // Stat cards + insights
    (function() {
      var avg = function(arr) { return Math.round(arr.reduce(function(a,b){return a+b;},0)/arr.length); };
      var scoreColor = function(s) { return s >= 80 ? 'var(--color-success)' : s >= 65 ? 'var(--color-warning-text)' : 'var(--color-danger)'; };

      var tokenModules = MODULES.filter(function(m){ return m.tokens !== null; });
      var avgA11y = avg(MODULES.map(function(m){return m.a11y;}));
      var avgI18n = avg(MODULES.map(function(m){return m.i18n;}));
      var avgTokens = avg(tokenModules.map(function(m){return m.tokens.score;}));
      var atRisk = MODULES.filter(function(m){
        var scores = [m.a11y, m.i18n].concat(m.tokens ? [m.tokens.score] : []);
        return scores.some(function(s){return s < 65;});
      });
      var totalViolations = tokenModules.reduce(function(s,m){return s+m.tokens.violations;},0);
      var totalCssFiles = tokenModules.reduce(function(s,m){return s+m.tokens.css_files;},0);

      var statCards = [
        { label:'Avg A11y',          value: avgA11y + '/100',  desc:'13 modules evaluated',     color: scoreColor(avgA11y) },
        { label:'Avg i18n',          value: avgI18n + '/100',  desc:'13 modules evaluated',     color: scoreColor(avgI18n) },
        { label:'Avg Token Adoption', value: avgTokens + '%',  desc:'11 modules scanned',        color: scoreColor(avgTokens) },
        { label:'Modules at Risk',   value: atRisk.length,     desc:'any dimension below 65',   color: atRisk.length > 6 ? 'var(--color-danger)' : 'var(--color-warning-text)' }
      ];
      document.getElementById('stat-section').innerHTML = statCards.map(function(s){
        return '<div class="stat-card"><div class="stat-card__label">'+s.label+'</div><div class="stat-card__value" style="color:'+s.color+';">'+s.value+'</div><div class="stat-card__description">'+s.desc+'</div></div>';
      }).join('');

      var a11yLow = MODULES.filter(function(m){return m.a11y < 65;});
      var i18nLow = MODULES.filter(function(m){return m.i18n < 65;});
      var topPerf = MODULES.filter(function(m){return m.a11y >= 80 && m.i18n >= 80 && (!m.tokens || m.tokens.score >= 70);});
      var tokenLow = tokenModules.filter(function(m){return m.tokens.score < 50;});
      var insights = '';

      if (a11yLow.length > 0) {
        insights += '<div class="callout callout--danger"><div class="callout__title">Accessibility Risk: '+a11yLow.length+' module'+(a11yLow.length>1?'s':'')+' below threshold</div><div class="callout__body">'+a11yLow.map(function(m){return m.display;}).join(', ')+' score below 65 on A11y. These modules are highest priority for accessibility remediation before release.</div></div>';
      }
      if (i18nLow.length > 0) {
        insights += '<div class="callout callout--warning"><div class="callout__title">i18n Coverage: '+i18nLow.length+' module'+(i18nLow.length>1?'s':'')+' need attention</div><div class="callout__body">'+i18nLow.map(function(m){return m.display;}).join(', ')+' score below 65 on internationalization. These modules likely contain hardcoded user-visible strings that need Applanga coverage.</div></div>';
      }
      insights += '<div class="callout callout--info"><div class="callout__title">Luna Token Adoption: '+totalViolations+' violations across '+totalCssFiles+' CSS files</div><div class="callout__body">'+tokenModules.length+' modules scanned for hardcoded CSS values.'+(tokenLow.length > 0 ? ' '+tokenLow.length+' module'+(tokenLow.length>1?'s':'')+' ('+tokenLow.map(function(m){return m.display;}).join(', ')+') score below 50%: click any token score to see specific violations and suggested fixes.' : ' Token adoption is progressing well across scanned modules.')+'</div></div>';
      if (topPerf.length > 0) {
        insights += '<div class="callout callout--success"><div class="callout__title">Top Performers</div><div class="callout__body">'+topPerf.map(function(m){return m.display;}).join(', ')+' score 80+ on both A11y and i18n with strong token adoption. Use these modules as implementation references.</div></div>';
      }
      document.getElementById('insights-section').innerHTML = insights;
    })();
  </script>

  <div class="mi-overlay" id="miOverlay" onclick="closeMI()">
    <div class="mi-box" onclick="event.stopPropagation()">
      <button class="mi-close" onclick="closeMI()">&#x2715;</button>
      <div id="miContent"></div>
    </div>
  </div>

</body>
</html>
