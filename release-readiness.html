<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Release Readiness: AuditBoard Frontend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #0B64DD;
      --color-primary-bg: #F1F6FF;
      --color-accent: #BC1E70;
      --color-accent-secondary: #008B87;
      --color-success: #008A5E;
      --color-success-bg: #E6F5F0;
      --color-warning: #FACB3D;
      --color-warning-text: #825803;
      --color-warning-bg: #FFF8E1;
      --color-danger: #C61E25;
      --color-danger-bg: #FDECEA;
      --color-ink: #1A1C21;
      --color-paragraph: #343741;
      --color-subdued: #646A76;
      --color-light-shade: #E3E8F2;
      --color-lightest-shade: #F5F7FA;
      --color-empty-shade: #FFFFFF;
      --font-body: 'Inter', BlinkMacSystemFont, Helvetica, Arial, sans-serif;
      --font-mono: 'Roboto Mono', Menlo, Courier, monospace;
      --font-weight-regular: 400;
      --font-weight-medium: 450;
      --font-weight-semibold: 500;
      --font-weight-bold: 600;
      --text-xs: 0.857rem;
      --text-s:  1.000rem;
      --text-m:  1.143rem;
      --text-l:  1.429rem;
      --text-xl: 1.714rem;
      --text-xxl: 2.143rem;
      --line-height-xs: 1.429rem;
      --line-height-s:  1.714rem;
      --line-height-m:  2.000rem;
      --space-xxs: 2px;
      --space-xs:  4px;
      --space-s:   8px;
      --space-m:   12px;
      --space-base: 16px;
      --space-l:   24px;
      --space-xl:  32px;
      --space-xxl: 40px;
      --space-xxxl: 48px;
      --border-thin: 1px solid #E3E8F2;
      --border-thick: 2px solid #E3E8F2;
      --border-radius: 4px;
      --shadow-s: 0 1px 3px hsla(217,30%,24%,.10), 0 4px 8px hsla(217,30%,24%,.07);
      --page-max-width: 1100px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); font-size: var(--text-s); font-weight: var(--font-weight-regular); line-height: var(--line-height-s); color: var(--color-paragraph); background: var(--color-lightest-shade); -webkit-font-smoothing: antialiased; }
    h4 { font-size: var(--text-m); font-weight: var(--font-weight-semibold); color: var(--color-ink); }
    a { color: var(--color-primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page-header { background: var(--color-empty-shade); border-bottom: var(--border-thin); padding: var(--space-l) 0; }
    .page-header-inner { max-width: var(--page-max-width); margin: 0 auto; padding: 0 var(--space-l); }
    .breadcrumb { font-size: var(--text-xs); color: var(--color-subdued); margin-bottom: var(--space-xs); }
    .breadcrumb a { color: var(--color-primary); }
    .page-header h1 { font-size: var(--text-l); font-weight: var(--font-weight-semibold); color: var(--color-ink); }
    .page-header p { font-size: var(--text-xs); color: var(--color-subdued); margin-top: var(--space-xs); }

    .page-body { max-width: var(--page-max-width); margin: 0 auto; padding: var(--space-l); }

    .badge { display: inline-flex; align-items: center; font-size: var(--text-xs); font-weight: var(--font-weight-semibold); padding: 2px var(--space-s); border-radius: var(--border-radius); line-height: 1.5; white-space: nowrap; }
    .badge--default { background: var(--color-lightest-shade); color: var(--color-subdued); border: var(--border-thin); }
    .badge--success { background: var(--color-success-bg); color: var(--color-success); }
    .badge--warning { background: var(--color-warning-bg); color: var(--color-warning-text); }
    .badge--danger  { background: var(--color-danger-bg);  color: var(--color-danger); }
    .badge--na      { background: var(--color-lightest-shade); color: var(--color-subdued); border: var(--border-thin); font-style: italic; }

    .panel { background: var(--color-empty-shade); border: var(--border-thin); border-radius: var(--border-radius); }
    .panel-header { display: flex; align-items: center; justify-content: space-between; padding: var(--space-m) var(--space-l); border-bottom: var(--border-thin); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: var(--text-s); }
    thead th { font-size: calc(var(--text-xs) * 1.5); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-subdued); text-align: left; padding: var(--space-xl) var(--space-m); border-bottom: var(--border-thick); white-space: normal; }
    thead th .th-inner { display: flex; align-items: flex-start; gap: var(--space-xs); flex-wrap: nowrap; }
    thead th .th-icon { padding-top: 0.15em; }
    thead th .th-icon { flex-shrink: 0; opacity: 0.7; }
    thead th .th-icon svg { width: 1.3em; height: 1.3em; }
    thead th.th-clickable { cursor: pointer; transition: background 0.1s, color 0.1s; }
    thead th.th-clickable:hover { background: var(--color-primary-bg); color: var(--color-primary); }
    thead th.th-clickable:hover .th-icon { opacity: 1; }
    tbody td { padding: var(--space-m); border-bottom: var(--border-thin); vertical-align: middle; color: var(--color-paragraph); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr.data-row:hover { background: var(--color-lightest-shade); }

    /* Score buttons */
    .score-btn { display: inline-flex; align-items: center; gap: 4px; font-size: var(--text-xs); font-weight: var(--font-weight-semibold); padding: 3px var(--space-s); border-radius: var(--border-radius); line-height: 1.5; border: none; cursor: pointer; font-family: var(--font-body); transition: opacity 0.12s, box-shadow 0.12s; }
    .score-btn:hover { opacity: 0.82; box-shadow: 0 1px 2px hsla(217,30%,24%,.08), 0 2px 4px hsla(217,30%,24%,.06); }
    .score-btn.success { background: var(--color-success-bg); color: var(--color-success); }
    .score-btn.warning { background: var(--color-warning-bg); color: var(--color-warning-text); }
    .score-btn.danger  { background: var(--color-danger-bg);  color: var(--color-danger); }
    .score-btn.null-score { background: var(--color-lightest-shade); color: var(--color-subdued); border: var(--border-thin); cursor: default; }
    .score-btn.null-score:hover { opacity: 1; box-shadow: none; }

    /* Average row */
    tr.avg-row td { background: var(--color-lightest-shade); border-bottom: var(--border-thick); padding: var(--space-xl) var(--space-m); }
    .avg-row__label { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-subdued); }
    .avg-score { display: flex; flex-direction: column; align-items: flex-start; gap: var(--space-xs); }
    .avg-score__value { font-size: var(--text-xxl); font-weight: var(--font-weight-semibold); font-variant-numeric: tabular-nums; line-height: 1; }

    .module-name { font-weight: var(--font-weight-semibold); color: var(--color-ink); }

    /* Drawer */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(7,16,31,0.55); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(2px); }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 50%; left: 50%; width: 92%; max-width: 960px; max-height: 88vh; background: var(--color-empty-shade); border: var(--border-thin); border-radius: 10px; box-shadow: 0 24px 64px hsla(217,30%,10%,.28), 0 4px 16px hsla(217,30%,24%,.14); z-index: 101; transform: translate(-50%, -50%) scale(0.96); opacity: 0; pointer-events: none; transition: transform 0.2s cubic-bezier(.34,1.3,.64,1), opacity 0.15s; overflow-y: auto; display: flex; flex-direction: column; }
    .drawer.open { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
    .drawer-header { position: sticky; top: 0; background: var(--color-empty-shade); border-bottom: var(--border-thin); padding: var(--space-l); display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-m); z-index: 1; border-radius: 10px 10px 0 0; }
    .drawer-header-title h3 { font-size: var(--text-m); font-weight: var(--font-weight-semibold); color: var(--color-ink); }
    .drawer-header-title .drawer-subtitle { font-size: var(--text-xs); color: var(--color-subdued); margin-top: 2px; }
    .drawer-close { background: none; border: none; cursor: pointer; color: var(--color-subdued); font-size: 20px; padding: var(--space-xs); border-radius: var(--border-radius); line-height: 1; flex-shrink: 0; }
    .drawer-close:hover { background: var(--color-lightest-shade); color: var(--color-ink); }
    .drawer-body { padding: var(--space-l); flex: 1; }
    .drawer-section { margin-bottom: var(--space-xl); }
    .drawer-section:last-child { margin-bottom: 0; }
    .drawer-section-title { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-ink); margin-bottom: var(--space-m); padding-bottom: var(--space-s); border-bottom: var(--border-thin); }
    .drawer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-l); }
    @media (max-width: 640px) { .drawer-grid { grid-template-columns: 1fr; } }
    .drawer-col-label { font-size: var(--text-xs); font-weight: var(--font-weight-semibold); text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-subdued); margin-bottom: var(--space-s); }
    .risk-list { list-style: none; padding: 0; margin: 0; }
    .risk-list li { font-size: var(--text-xs); color: var(--color-paragraph); padding: var(--space-xs) 0 var(--space-xs) var(--space-m); border-bottom: var(--border-thin); position: relative; line-height: var(--line-height-s); }
    .risk-list li:last-child { border-bottom: none; }
    .risk-list li::before { content: ''; position: absolute; left: 4px; top: 10px; width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.4; }
    .token-file-list { list-style: none; padding: 0; margin: 0; }
    .token-file-item { display: flex; align-items: center; justify-content: space-between; padding: var(--space-xs) 0; border-bottom: var(--border-thin); gap: var(--space-m); }
    .token-file-item:last-child { border-bottom: none; }
    .token-file-path { font-family: var(--font-mono); font-size: 0.78rem; color: var(--color-paragraph); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .token-file-stats { display: flex; gap: var(--space-s); flex-shrink: 0; }
    .callout { border-radius: var(--border-radius); padding: var(--space-m) var(--space-l); border-left: 4px solid; margin-bottom: var(--space-m); }
    .callout--info    { background: var(--color-primary-bg); border-color: var(--color-primary); }
    .callout--success { background: var(--color-success-bg); border-color: var(--color-success); }
    .callout--warning { background: var(--color-warning-bg); border-color: var(--color-warning); }
    .callout--danger  { background: var(--color-danger-bg);  border-color: var(--color-danger); }
    .callout__title { font-size: var(--text-s); font-weight: var(--font-weight-semibold); margin-bottom: var(--space-xs); color: var(--color-ink); }
    .callout__body { font-size: var(--text-s); color: var(--color-paragraph); }
    .code-example { background: var(--color-lightest-shade); border: var(--border-thin); border-radius: var(--border-radius); padding: var(--space-m); font-family: var(--font-mono); font-size: var(--text-xs); }
    .code-before { color: var(--color-danger); }
    .code-after  { color: var(--color-success); }
    .prompt-pre { font-size: var(--text-xs); line-height: 1.65; background: var(--color-lightest-shade); border: var(--border-thin); border-radius: var(--border-radius); padding: var(--space-m) var(--space-l); white-space: pre-wrap; word-break: break-word; color: var(--color-paragraph); font-family: var(--font-body); overflow: hidden; }
    .prompt-pre.prompt-collapsed { max-height: 4.95em; }
    .prompt-toggle { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; color: var(--color-primary); font-size: var(--text-xs); cursor: pointer; padding: var(--space-xs) 0; font-family: var(--font-body); font-weight: var(--font-weight-semibold); margin-top: var(--space-xs); }
    .prompt-toggle:hover { text-decoration: underline; }
    .prompt-copy-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: var(--border-thin); border-radius: var(--border-radius); color: var(--color-primary); font-size: var(--text-xs); font-family: var(--font-body); font-weight: var(--font-weight-semibold); cursor: pointer; padding: 2px var(--space-s); transition: all 0.15s; }
    .prompt-copy-btn:hover { background: var(--color-primary-bg); }
    .prompt-copy-btn.copied { color: var(--color-success); border-color: var(--color-success); background: var(--color-success-bg); }
    .drawer-section-title { display: flex; align-items: center; gap: var(--space-s); }
    .drawer-section-title svg { color: var(--color-primary); flex-shrink: 0; }
  </style>
</head>
<body>

  <header class="page-header">
    <div class="page-header-inner">
      <div class="breadcrumb"><a href="index.html">Projects</a> / Release Readiness</div>
      <h1>Release Readiness: AuditBoard Frontend</h1>
      <p>A11y, i18n, Luna token adoption, and Smart Forms governance per module · Click any score for details</p>
      <p class="text-subdued text-xs" style="margin-top:var(--space-xs);">March 26, 2026 at 06:00 PM</p>
    </div>
  </header>

  <main class="page-body">

    <div class="panel">
      <div class="panel-header">
        <h4>Module Scores</h4>
        <span class="badge badge--default">13 modules</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th></th>
              <th class="th-clickable" onclick="openColumnDrawer('a11y')" title="Click to learn how A11y scores are evaluated"><div class="th-inner"><span class="th-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="3" r="1.5" fill="currentColor"/><path d="M4 6.5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 6.5v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M5.5 13.5L8 10.5l2.5 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>A11y</div></th>
              <th class="th-clickable" onclick="openColumnDrawer('i18n')" title="Click to learn how i18n scores are evaluated"><div class="th-inner"><span class="th-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M8 2.5S6 5 6 8s2 5.5 2 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2.5 8h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3 5.5h10M3 10.5h10" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.5"/></svg></span>i18n</div></th>
              <th class="th-clickable" onclick="openColumnDrawer('tokens')" title="Click to learn how Luna Token scores are evaluated"><div class="th-inner"><span class="th-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13.5 10.5A6 6 0 116 3.5a4 4 0 007.5 7z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Luna<br>Tokens</div></th>
              <th class="th-clickable" onclick="openColumnDrawer('smart-forms')" title="Click to learn how Smart Forms scores are evaluated"><div class="th-inner"><span class="th-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="2" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 5.5h5M5.5 8h5M5.5 10.5h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>Smart<br>Forms</div></th>
              <th><div class="th-inner"><span class="th-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="1.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5"/></svg></span>General<br>Consistency</div></th>
              <th><div class="th-inner"><span class="th-icon"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 2L13.5 7L8 14L2.5 7L8 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M2.5 7H13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>Luna<br>Consistency</div></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

  </main>

  <div id="drawer-overlay" class="drawer-overlay" onclick="closeDrawer()"></div>
  <div id="drawer" class="drawer" role="dialog" aria-modal="true" tabindex="-1">
    <div class="drawer-header" id="drawerHeader"></div>
    <div class="drawer-body" id="drawerBody"></div>
  </div>

  <script>
    const MODULES = [
      { name:'admin', display:'Admin',
        a11y:75, i18n:82,
        a11yRisks:['No aria-live regions for async status changes','Icon-only buttons rely on @tooltip as sole label'],
        a11yRecs:['Add role="status" aria-live="polite" around search result counts','Add explicit aria-label to all IconButton usages'],
        i18nRisks:['PROJ#{id} pattern should be documented as format-exempt'],
        i18nRecs:['Run pnpm generate:en-US to capture strings from recent admin work'],
        tokens:{ score:100, violations:0, css_files:0, token_usages:0, by_cat:{color:0,space:0,radius:0,typography:0}, top_files:[] },
        smartForms:{ score:55, risks:['The create-tag and control-group forms bypass Smart Forms entirely, meaning schema-driven validation, field-level error handling, and future form governance tooling are not applied.','The password-policy page\'s InlineForm pattern is a legacy interaction model that does not support standard form primitives, making it hard to migrate incrementally.'], recs:['Migrate create-tag.gts and control-group create/edit forms to SchemaFormLoader with a FormBehavior subclass to gain schema-driven validation and governance compliance.','Replace the InlineForm/InlineTextfield/InlineTextarea usages in password-policy/template.gjs with SchemaForm or Luna Form primitives, and remove the LunaSettingsContainer legacy layout dependency.'] }
      },
      { name:'workspace', display:'Workspace',
        a11y:66, i18n:80,
        a11yRisks:['No explicit focus management on route transitions','ARIA entirely delegated to Luna internals across 51 sub-routes'],
        a11yRecs:['Audit 51 workspace sub-routes for custom interactive elements bypassing Luna','Add focus-management on modal/drawer open for custom overlay patterns'],
        i18nRisks:['842-file scope makes coverage uniformity hard to verify'],
        i18nRecs:['Run intl-extractor against full workspace directory to surface drifted strings'],
        tokens: null,
        smartForms: { score: null, reason: 'All routes are read-only audit log and datatable views with no user-facing form fields. Verified by inspecting all five route templates: audit-log, recent-views, unread, index, and 404.' }
      },
      { name:'site-configuration', display:'Site Configuration',
        a11y:63, i18n:88,
        a11yRisks:['app-settings.gjs (576 lines) has only 1 aria-label despite dense form content','features.gjs (887 lines) has no detected ARIA in sampled sections'],
        a11yRecs:['Add aria-describedby linking each @helperText to its input in app-settings.gjs','Audit features.gjs toggles and selects for missing labels'],
        i18nRisks:['Character limits embedded in label strings block translator flexibility'],
        i18nRecs:['Parameterize character limits: formatMessage("Company Name (max {limit} chars)", { limit: 200 })'],
        tokens: null,
        smartForms:{ score:45, risks:['Pervasive LunaSettingsContainer usage across seven routes creates significant migration surface area; any future form governance tooling or accessibility auditing will be blocked by these legacy wrappers.','The branding page\'s placeholder-as-label Input pattern will fail accessibility audits since users relying on assistive technology have no persistent label when the field is populated.'], recs:['Incrementally replace SettingListItemTextfield/SettingListItemTextarea wrappers with SchemaForm-governed fields starting with the branding and email-settings routes, which have the most user-editable inputs.','Fix the placeholder-as-label violation in branding/template.gjs immediately by adding a proper Field with a label slot above the brand name Input and removing the placeholder attribute.'] }
      },
      { name:'opsaudits', display:'Ops Audits',
        a11y:52, i18n:76,
        a11yRisks:['0 aria-label/describedby/role attributes in any sampled template','Import modal open has no screen reader announcement'],
        a11yRecs:['Add aria-label to all icon-only buttons in workflow list templates','Add focus management on import modal open: move focus to first focusable element'],
        i18nRisks:['OpsAudit-specific terminology needs translator context notes'],
        i18nRecs:['Add Applanga context notes for "OpsAudit" and "Work Step" to prevent mistranslation'],
        tokens:{ score:100, violations:0, css_files:6, token_usages:0, by_cat:{color:0,space:0,radius:0,typography:0}, top_files:[] },
        smartForms: { score: null, reason: 'The primary create flow is a 3-step wizard (Select Template, Select Auditable Entities, Select Audit Attributes). Multi-step wizard flows are an approved exemption from Smart Forms governance per the Form Governance and Exception Process policy.' }
      },
      { name:'assessments', display:'Assessments',
        a11y:82, i18n:85,
        a11yRisks:['didInsert focus management (comment.gjs:163) is Ember-classic; verify lifecycle compatibility'],
        a11yRecs:['Document aria-labelledby="comments-heading-{{@model.id}}" as the team standard for dynamic region labeling'],
        i18nRisks:['Email notification setting labels need translator context for configuration-specific copy'],
        i18nRecs:['Add @description hint strings to complex notification setting labels'],
        tokens:{ score:0, violations:5, css_files:7, token_usages:0, by_cat:{color:0,space:5,radius:0,typography:0},
          top_files:[
            {path:'apps/client/app/components/module-assessments/view/stepper/ratings.css',violations:3},
            {path:'apps/client/app/components/module-assessments/components/assessable-response-table.css',violations:1},
            {path:'apps/client/app/components/module-assessments/components/assessment-progress-bar.css',violations:1}

    function copyPromptBtn(btn) {
      const svgCopy = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      const svgCheck = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      const succeed = function() {
        btn.classList.add('copied'); btn.innerHTML = svgCheck + ' Copied!';
        setTimeout(function() { btn.classList.remove('copied'); btn.innerHTML = svgCopy + ' Copy'; }, 2200);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(_currentPrompt).then(succeed).catch(function() {
          const ta = document.createElement('textarea'); ta.value = _currentPrompt;
          ta.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(ta);
          ta.select(); document.execCommand('copy'); document.body.removeChild(ta); succeed();
        });
      } else {
        const ta = document.createElement('textarea'); ta.value = _currentPrompt;
        ta.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta); succeed();
      }
    }

    function togglePrompt(btn) {
      const pre = btn.previousElementSibling;
      const nowCollapsed = pre.classList.toggle('prompt-collapsed');
      const svgDown = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
      const svgUp = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>';
      btn.innerHTML = nowCollapsed ? svgDown + ' Show full prompt' : svgUp + ' Collapse';
    }

        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">' +
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
            'Findings' +
          '</div>' +
          '<div class="drawer-grid">' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-danger);">Risks</div>' +
              '<ul class="risk-list" style="color:var(--color-danger);">' + risks + '</ul>' +
            '</div>' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-success);">Recommendations</div>' +
              '<ul class="risk-list" style="color:var(--color-success);">' + recs + '</ul>' +
            '</div>' +
          '</div>' +
        '</div>' +
        promptSection();
    }

    // ---- Luna Consistency content ----
    function buildLunaConsistencyPrompt(m) {
      if (!m.lunaConsistency || m.lunaConsistency.score === null) return '';
      const path = MODULE_PATHS[m.name] || 'apps/client/app/components/' + m.name;
      const L = [];
      L.push('Fix the following Luna Design System consistency violations in the ' + m.display + ' module of auditboard-frontend.');
      L.push('Repo root: /Users/jcarpenter/Git Repositories/auditboard-frontend');
      L.push('Current score: ' + m.lunaConsistency.score + '/100 (' + letterGrade(m.lunaConsistency.score) + ')');
      L.push('');
      L.push('LUNA STANDARDS (non-negotiable):');
      L.push('- Import UI components from @auditboard/luna-core. Do not use raw <button>, <input>, <select>, or <table> where Luna equivalents exist.');
      L.push('- CSS files must use --luna-space-*, --luna-color-*, --luna-radius-* custom properties instead of hardcoded px/hex values.');
      L.push('- Do not import LunaFormGroup or LunaSettingsContainer from @auditboard/legacy-design-system where Luna Field/Input is available.');
      L.push('- Apply {{trap-focus}} to all modal and drawer overlays.');
      L.push('');
      L.push('VIOLATIONS FOUND:');
      m.lunaConsistency.risks.forEach(function(r) { L.push('- ' + r); });
      L.push('');
      L.push('REQUIRED CHANGES (implement each one):');
      m.lunaConsistency.recs.forEach(function(r) { L.push('- ' + r); });
      L.push('');
      L.push('HOW TO PROCEED:');
      L.push('1. Use Grep to locate each file referenced in the violations above within ' + path + '/.');
      L.push('2. For raw HTML elements: replace with the Luna equivalent from @auditboard/luna-core.');
      L.push('3. For CSS hardcoded values: replace with the appropriate --luna-* custom property.');
      L.push('4. For LunaFormGroup: replace with Luna Field + Input primitives or SchemaForm.');
      L.push('5. For missing {{trap-focus}}: add the modifier to the overlay container element.');
      L.push('6. Do not change anything outside the scope of the listed violations.');
      return L.join('\n');
    }

    function buildLunaConsistencyContent(m) {
      if (!m.lunaConsistency) {
        _currentPrompt = '';
        return '<div class="callout callout--warning">' +
          '<div class="callout__title">Not Yet Evaluated</div>' +
          '<div class="callout__body">Luna Consistency scores have not been generated for this module yet. Run <code>eval-coordinator</code> against the auditboard-frontend repo to populate scores.</div>' +
        '</div>';
      }
      const lc = m.lunaConsistency;
      const calloutType = lc.score >= 80 ? 'success' : lc.score >= 65 ? 'warning' : 'danger';
      const risks = lc.risks.map(function(r) { return '<li>' + escHtml(r) + '</li>'; }).join('');
      const recs  = lc.recs.map(function(r) { return '<li>' + escHtml(r) + '</li>'; }).join('');
      _currentPrompt = buildLunaConsistencyPrompt(m);
      return '<div class="callout callout--' + calloutType + '" style="margin-bottom:var(--space-l);">' +
          '<div class="callout__title">Score: ' + lc.score + '/100 (Grade ' + letterGrade(lc.score) + ')</div>' +
          '<div class="callout__body">Evaluates how completely and correctly the module uses the Luna Design System: component adoption from <code>@auditboard/luna-core</code>, CSS token usage, avoidance of legacy-design-system imports, correct Luna API usage, and Luna accessibility modifier coverage.</div>' +
        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">' +
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
            'Findings' +
          '</div>' +
          '<div class="drawer-grid">' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-danger);">Risks</div>' +
              '<ul class="risk-list" style="color:var(--color-danger);">' + risks + '</ul>' +
            '</div>' +
            '<div>' +
              '<div class="drawer-col-label" style="color:var(--color-success);">Recommendations</div>' +
              '<ul class="risk-list" style="color:var(--color-success);">' + recs + '</ul>' +
            '</div>' +
          '</div>' +
        '</div>' +
        promptSection();
    }

    // ---- Lightbox open/close ----
    // ---- Column header lightboxes ----
    var COLUMN_DEFS = {
      'a11y': {
        title: 'Accessibility (A11y)',
        badge: 'LLM-as-Judge Eval',
        skillUrl: 'https://github.com/jcarpenter-optro/dashboard-projects/blob/main/skills/eval-accessibility.md',
        about: 'Each module is scored 0-100 against WCAG 2.2 using the LLM-as-judge eval pattern: a structured Claude Code skill submits the full module source to Claude alongside a detailed rubric, and Claude returns a calibrated numeric score with reasoning. This is a standard technique in AI-assisted code quality pipelines where a language model acts as a consistent, scalable judge across a defined evaluation framework.',
        signals: [
          'Semantic HTML and ARIA: native elements vs. div-based interactive components, role correctness, landmark regions',
          'Keyboard operability: Tab/Enter/Space reachability, focus management on route transitions and modals, focus traps',
          'Colour contrast: static analysis of hardcoded color values against WCAG contrast ratios',
          'Images and media: alt text presence and meaningfulness, decorative image handling',
          'Form accessibility: visible labels, error message associations via aria-describedby, required field indicators',
          'Dynamic content: aria-live regions, role="status"/role="alert" usage, focus on async content updates'
        ],
        bands: [
          { label: 'A', range: '90-100', desc: 'Native semantics throughout. All interactive elements keyboard-operable. ARIA used correctly and sparingly. All forms labeled.' },
          { label: 'B', range: '75-89', desc: 'Most criteria met. Minor gaps: one or two div-based interactive elements or a generic ARIA label.' },
          { label: 'C', range: '50-74', desc: 'Several accessibility issues. Inconsistent ARIA. Some unlabeled form inputs or missing focus management.' },
          { label: 'D', range: '25-49', desc: 'Widespread keyboard inaccessibility. Missing labels. No live regions. Assistive technology partially blocked.' },
          { label: 'F', range: '0-24', desc: 'No semantic HTML, no ARIA, no keyboard support. Assistive technology cannot navigate the module.' }
        ]
      },
      'i18n': {
        title: 'Internationalization (i18n)',
        badge: 'LLM-as-Judge Eval',
        skillUrl: 'https://github.com/jcarpenter-optro/dashboard-projects/blob/main/skills/eval-i18n.md',
        about: 'Each module is scored 0-100 for translation and locale readiness using the LLM-as-judge eval pattern: a structured Claude Code skill submits the full module source to Claude with a detailed i18n rubric, and Claude returns a calibrated score with signal-by-signal reasoning. This mirrors standard eval pipelines used in AI quality assurance, applied here to frontend internationalization compliance.',
        signals: [
          'Hardcoded string detection: user-visible English strings in JSX, error messages, button labels, and toast notifications',
          'Translation key usage: presence of an i18n library and consistent use of formatMessage / t() / intl.t()',
          'Locale-aware formatting: dates, numbers, and currencies via Intl.DateTimeFormat / Intl.NumberFormat',
          'Pluralization: ICU MessageFormat or library pluralization vs. raw JS ternaries like count === 1 ? "item" : "items"',
          'RTL layout readiness: logical CSS properties, no hard direction:ltr overrides, flexible container widths',
          'Pseudo-localization resilience: containers that handle 30% string expansion without clipping or overflow'
        ],
        bands: [
          { label: 'A', range: '90-100', desc: 'Zero hardcoded user-facing strings. All dates, numbers, and currencies locale-formatted. Pluralization via library. RTL-compatible.' },
          { label: 'B', range: '75-89', desc: 'Near-zero hardcoded strings. Locale formatting mostly applied. Minor RTL or pluralization gaps.' },
          { label: 'C', range: '50-74', desc: 'Some hardcoded strings (up to 20% of visible text). Currency or date formatting not locale-aware.' },
          { label: 'D', range: '25-49', desc: 'Majority of UI strings hardcoded. i18n library present but inconsistently used. Layout will break under string expansion.' },
          { label: 'F', range: '0-24', desc: 'No i18n library. All strings hardcoded in English. Fixed-width containers that clip text. Not ready for any non-English locale.' }
        ]
      },
      'tokens': {
        title: 'Luna Token Adoption',
        badge: 'Static Analysis Scan',
        skillUrl: 'https://github.com/jcarpenter-optro/dashboard-projects/blob/main/skills/update-tokens.md',
        about: 'Unlike the other three columns, Luna Token scores are produced by deterministic static analysis, not an LLM judge. A Python scanner (luna-module-audit.py) reads every CSS file in the module and counts hardcoded color, spacing, radius, and typography values that should instead reference Luna design system token variables. The score formula is: (1 - violations / token_usages) x 100.',
        signals: [
          'Color: hardcoded hex, rgb(), or hsl() values that should use Luna color tokens (--color-*)',
          'Spacing: raw px or rem values for margin, padding, and gap that should use Luna space tokens (--space-*)',
          'Border radius: hardcoded pixel values that should use --border-radius token variables',
          'Typography: hardcoded font-size values that should use Luna text scale tokens (--text-*)',
          'Score formula: (1 - violations / token_usages) x 100, floored at 0'
        ],
        bands: [
          { label: 'A', range: '90-100', desc: 'Nearly all CSS values use Luna tokens. Fewer than 1 violation per 10 token usages.' },
          { label: 'B', range: '75-89', desc: 'Strong token adoption with minor hardcoded exceptions in a few files.' },
          { label: 'C', range: '50-74', desc: 'Mixed adoption. Several files still use hardcoded values alongside tokens.' },
          { label: 'D', range: '25-49', desc: 'Hardcoded values are common. Token adoption is partial or inconsistent across the module.' },
          { label: 'F', range: '0-24', desc: 'Predominantly hardcoded CSS. Luna tokens rarely or never used.' }
        ]
      },
      'smart-forms': {
        title: 'Smart Forms',
        badge: 'LLM-as-Judge Eval',
        skillUrl: 'https://github.com/jcarpenter-optro/dashboard-projects/blob/main/skills/eval-smart-forms.md',
        about: 'Each module is scored 0-100 for compliance with AuditBoard\'s Smart Forms governance policy using the LLM-as-judge eval pattern: a structured Claude Code skill submits the full module source to Claude with a governance rubric, and Claude returns a calibrated score. Smart Forms governance requires all forms to use @auditboard/schema-form. Modules containing only multi-step forms, questionnaires, or assessment workflows are exempt and show N/A.',
        signals: [
          'SchemaForm adoption: imports from @auditboard/schema-form, use of SchemaFormLoader and schemaFormEngineResource',
          'Legacy form removal: absence of LunaFormGroup, manual inline forms, and v1 form template patterns',
          'Create form pattern: bordered inputs, group-on-submit validation, row-based layout, always-enabled submit button',
          'Click-to-edit pattern: transparent inputs, per-field blur save, column-based layout in quickview panels',
          'Form design best practices: declarative noun labels, no placeholder misuse, asterisk-only required field markers',
          'Feature flag gates: no withFlag or getFlag calls still blocking SchemaForm rollout'
        ],
        bands: [
          { label: 'A', range: '90-100', desc: 'All forms use SchemaForm. No legacy patterns. Create and click-to-edit patterns correctly implemented.' },
          { label: 'B', range: '75-89', desc: 'Mostly SchemaForm. One or two legacy forms remain or a minor pattern deviation.' },
          { label: 'C', range: '50-74', desc: 'Partial adoption. Some forms use SchemaForm; others still use legacy patterns.' },
          { label: 'D', range: '25-49', desc: 'Minimal SchemaForm usage. Most forms are legacy or partially migrated.' },
          { label: 'F', range: '0-24', desc: 'No SchemaForm usage. All forms use legacy patterns. No migration in progress.' }
        ]
      }
    };

    function openColumnDrawer(facet) {
      var def = COLUMN_DEFS[facet];
      if (!def) return;

      var bandRows = def.bands.map(function(b) {
        return '<li style="display:flex;gap:var(--space-m);align-items:flex-start;padding:var(--space-s) 0;border-bottom:var(--border-thin);">' +
          '<span style="font-size:var(--text-xs);font-weight:var(--font-weight-semibold);background:var(--color-lightest-shade);border:var(--border-thin);border-radius:var(--border-radius);padding:2px 10px;flex-shrink:0;white-space:nowrap;">' + b.label + '&nbsp;&nbsp;' + b.range + '</span>' +
          '<span style="font-size:var(--text-xs);color:var(--color-paragraph);line-height:var(--line-height-s);">' + b.desc + '</span>' +
          '</li>';
      }).join('');

      var signalItems = def.signals.map(function(s) { return '<li>' + s + '</li>'; }).join('');

      var body =
        '<div class="drawer-section">' +
          '<div class="callout callout--info">' +
            '<div class="callout__title">How scores are calculated</div>' +
            '<div class="callout__body">' + def.about + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">What gets evaluated</div>' +
          '<ul class="risk-list">' + signalItems + '</ul>' +
        '</div>' +
        '<div class="drawer-section">' +
          '<div class="drawer-section-title">Scoring bands</div>' +
          '<ul style="list-style:none;padding:0;margin:0;">' + bandRows + '</ul>' +
        '</div>' +
        '<div class="drawer-section">' +
          '<a href="' + def.skillUrl + '" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:var(--space-s);font-size:var(--text-s);font-weight:var(--font-weight-semibold);color:var(--color-primary);text-decoration:none;padding:var(--space-s) var(--space-m);background:var(--color-primary-bg);border:1px solid var(--color-primary);border-radius:var(--border-radius);">' +
            '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M8 1.5C4.41 1.5 1.5 4.41 1.5 8c0 2.88 1.87 5.32 4.47 6.18.33.06.45-.14.45-.31v-1.09c-1.82.4-2.2-.88-2.2-.88-.3-.75-.72-.95-.72-.95-.59-.4.04-.4.04-.4.65.05 1 .67 1 .67.58 1 1.52.71 1.89.54.06-.42.23-.71.41-.87-1.45-.17-2.98-.73-2.98-3.24 0-.71.25-1.3.67-1.76-.07-.16-.29-.83.06-1.73 0 0 .55-.18 1.79.67A6.2 6.2 0 018 5.07c.55 0 1.1.07 1.62.22 1.24-.85 1.79-.67 1.79-.67.35.9.13 1.57.06 1.73.42.46.67 1.05.67 1.76 0 2.52-1.53 3.07-2.99 3.23.24.2.44.6.44 1.21v1.79c0 .17.12.37.45.31A6.51 6.51 0 0014.5 8c0-3.59-2.91-6.5-6.5-6.5z"/></svg>' +
            'View evaluation skill on GitHub' +
          '</a>' +
        '</div>';

      document.getElementById('drawerHeader').innerHTML =
        '<div>' +
          '<div style="font-size:var(--text-xs);color:var(--color-subdued);margin-bottom:var(--space-xs);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;">Evaluation Method</div>' +
          '<div style="font-size:var(--text-l);font-weight:var(--font-weight-semibold);color:var(--color-ink);margin-bottom:var(--space-s);">' + def.title + '</div>' +
          '<div style="display:flex;gap:var(--space-s);flex-wrap:wrap;">' +
            '<span class="badge badge--default">' + def.badge + '</span>' +
          '</div>' +
        '</div>' +
        '<button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>';

      document.getElementById('drawerBody').innerHTML = body;
      document.getElementById('drawer-overlay').classList.add('open');
      var drawer = document.getElementById('drawer');
      drawer.classList.add('open');
      drawer.focus();
      document.body.style.overflow = 'hidden';
    }

    function openDrawer(moduleName, facet) {
      const m = MODULES.find(function(x) { return x.name === moduleName; });
      if (!m) return;

      const scoreVal = facet === 'a11y' ? m.a11y
        : facet === 'i18n' ? m.i18n
        : facet === 'tokens' ? (m.tokens ? m.tokens.score : null)
        : facet === 'smart-forms' ? (m.smartForms ? m.smartForms.score : null)
        : facet === 'general-consistency' ? (m.generalConsistency ? m.generalConsistency.score : null)
        : (m.lunaConsistency ? m.lunaConsistency.score : null);
      const badgeClass = scoreVal !== null ? scoreBadgeClass(scoreVal) : 'badge--default';
      const facetLabel = facet === 'a11y' ? 'Accessibility'
        : facet === 'i18n' ? 'Internationalization'
        : facet === 'tokens' ? 'Luna Token Adoption'
        : facet === 'smart-forms' ? 'Smart Forms'
        : facet === 'general-consistency' ? 'General Consistency'
        : 'Luna Consistency';
      const scoreDisplay = scoreVal !== null ? (facet === 'tokens' ? scoreVal + '%' : scoreVal + '') : 'N/A';
      const gradeDisplay = scoreVal !== null ? letterGrade(scoreVal) : '';

      document.getElementById('drawerHeader').innerHTML =
        '<div>' +
          '<div style="font-size:var(--text-xs);color:var(--color-subdued);margin-bottom:var(--space-xs);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;">' + escHtml(m.display) + '</div>' +
          '<div style="font-size:var(--text-l);font-weight:var(--font-weight-semibold);color:var(--color-ink);margin-bottom:var(--space-s);">' + escHtml(m.name) + '</div>' +
          '<div style="display:flex;gap:var(--space-s);flex-wrap:wrap;">' +
            (scoreVal !== null ? '<span class="badge ' + badgeClass + '">' + scoreDisplay + '</span>' : '') +
            (gradeDisplay ? '<span class="badge ' + badgeClass + '">Grade ' + gradeDisplay + '</span>' : '') +
            (scoreVal === null && facet === 'smart-forms' && m.smartForms ? '<span class="badge badge--default">Exempt</span>' : '') +
            '<span class="badge badge--default">' + facetLabel + '</span>' +
          '</div>' +
        '</div>' +
        '<button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>';

      const body = document.getElementById('drawerBody');
      if (facet === 'a11y')                     body.innerHTML = buildA11yContent(m);
      else if (facet === 'i18n')                body.innerHTML = buildI18nContent(m);
      else if (facet === 'tokens')              body.innerHTML = buildTokensContent(m);
      else if (facet === 'smart-forms')         body.innerHTML = buildSmartFormsContent(m);
      else if (facet === 'general-consistency') body.innerHTML = buildGeneralConsistencyContent(m);
      else if (facet === 'luna-consistency')    body.innerHTML = buildLunaConsistencyContent(m);

      document.getElementById('drawer-overlay').classList.add('open');
      const drawer = document.getElementById('drawer');
      drawer.classList.add('open');
      drawer.focus();
      document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
      document.getElementById('drawer-overlay').classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDrawer(); });
  </script>

</body>
</html>
